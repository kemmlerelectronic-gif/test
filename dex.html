<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEMMSOFT 4.0 Testing</title>

<style>
/* Základní styly */
body{
font-family: 'Segoe UI', Arial, sans-serif; /* Moderní bezpatkový font */
background:url("background.png") center/cover fixed; /* Předpokládá se existující background.png */
margin:0;
color:white;
overflow-x: hidden; /* Zamezí horizontálnímu scrollu kvůli animacím */
}
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
z-index:-1;
}
.topbarContainer{ /* Název z tvého nového kódu */
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 25px;
background: rgba(0, 0, 0, 0.6); /* Lehce průhledné pozadí pro topbar */
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
transition: all 0.3s ease; /* Pro animaci skrytí/zobrazení */
}
/* ----- OPRAVENÁ TŘÍDA PRO SKRYTÍ TOPBARU ----- */
.topbarContainer.hidden { /* Název z tvého nového kódu */
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none; /* Zakáže interakci s neviditelným topbarem */
}

/* VYLEPŠENÝ TEXT LOGA */
.kemmsTop { /* Název z tvého nového kódu */
    font-size: 38px; /* Trochu větší */
    font-weight: 900; /* Extra bold */
    background: linear-gradient(45deg, #22c55e, #34d399); /* Původní zelená pro logo */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 15px rgba(34, 197, 94, 0.8), 0 0 25px rgba(52, 211, 153, 0.6); /* Zářivý neonový stín */
    letter-spacing: 1px; /* Jemné rozestupy */
    transition: all 0.3s ease;
    animation: logoPulse 4s infinite alternate ease-in-out;
}
/* Keyframes pro pulzování loga */
@keyframes logoPulse {
    0% {
        background: linear-gradient(45deg, #22c55e, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 15px rgba(34, 197, 94, 0.8), 0 0 25px rgba(52, 211, 153, 0.6);
    }
    50% {
        background: linear-gradient(45deg, #166534, #1a9a4e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 8px rgba(22, 101, 52, 0.7);
    }
    100% {
        background: linear-gradient(45deg, #22c55e, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 15px rgba(34, 197, 94, 0.8), 0 0 25px rgba(52, 211, 153, 0.6);
    }
}

/* VYLEPŠENÁ NAVIGAČNÍ TLAČÍTKA */
.topbar button{ /* Název z tvého nového kódu */
padding:12px 22px; /* Větší padding */
margin-left:10px; /* Větší mezera */
border:none;
border-radius:8px; /* Více zaoblené */
background: linear-gradient(135deg, #22c55e, #1a9a4e); /* Gradient */
color:white;
cursor:pointer;
font-size: 1.1em; /* Větší text */
font-weight: 600; /* Bold */
box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); /* 3D stín */
transition: all 0.3s ease; /* Plynulý přechod */
position: relative;
overflow: hidden; /* Pro efekty */
}
.topbar button::before { /* Jemná světelná záře */
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.1);
    transform: skewX(-30deg);
    transition: all 0.5s ease;
}
.topbar button:hover::before {
    left: 100%;
}
.topbar button:hover {
    background: linear-gradient(135deg, #1a9a4e, #22c55e); /* Otočený gradient při hoveru */
    transform: translateY(-3px) scale(1.02); /* Mírné zvednutí a zvětšení */
    box-shadow: 0 8px 25px rgba(34, 197, 94, 0.6); /* Výraznější stín */
}
/* Aktivní tlačítko */
.topbar button.active-nav {
    background: linear-gradient(135deg, #0f4f2c, #166534); /* Tmavší zelená pro aktivní */
    box-shadow: 0 2px 10px rgba(34, 197, 94, 0.8), inset 0 0 8px rgba(34, 197, 94, 0.6);
    transform: translateY(0);
    border: 1px solid #22c55e;
}

.header{
text-align:center;
font-size:68px; /* Pro TV */
background:#111827cc;
padding:10px;
transition: all 0.3s ease;
text-shadow: 2px 2px 8px rgba(0,0,0,0.7); /* Vylepšený stín */
border-bottom: 2px solid rgba(34, 197, 94, 0.5); /* Moderní linka */
min-height: 100px; /* Zajistí, že hlavička má vždy výšku */
display: flex; /* Pro centrování textu vertikálně */
align-items: center;
justify-content: center;
}
@keyframes headerBlink {
  0%, 100% { color: #22c55e; text-shadow: 0 0 15px #22c55e; }
  50% { color: #ffffff; text-shadow: none; }
}
.header.blink { animation: headerBlink 1s infinite; } /* Název z tvého nového kódu */

.layout{
display:grid;
grid-template-columns:4fr 1.3fr;
gap:20px;
padding:20px;
}
.rowTop{ display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:20px; }
.rowBottom{ display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }

/* KARTY LISŮ - VIZUÁLNÍ TUNING PRO VÝROBNÍ OBRAZOVKU */
.card{
background: linear-gradient(145deg, #020617ee, #111827ee); /* Dynamický tmavý gradient */
padding:25px;
border-radius:22px; /* Více zaoblené rohy */
text-align:center;
transition: all .4s ease-out; /* Dlouhý a plynulý transition pro všechny stavy */
position: relative;
box-shadow: 0 8px 20px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.05); /* Hluboký vnější a jemný vnitřní stín */
border: 1px solid rgba(34, 197, 94, 0.15); /* Jemný okraj */
}

/* Stav PŘIŘAZENO (ASSIGNED) */
.card.assigned{
background: linear-gradient(145deg, #16653499, #1a9a4e99); /* Zelenější, ale stále průhledný gradient */
color: #e0ffe0; /* Světle zelený text, aby vynikl */
box-shadow: 0 0 30px rgba(34, 197, 94, 0.7), inset 0 0 15px rgba(34, 197, 94, 0.5); /* Zářivější zelený stín */
border-color: #22c55e;
animation: pulseBorder 2s infinite ease-in-out; /* Nová pulzující animace okraje */
}
@keyframes pulseBorder {
    0% { border-color: rgba(34, 197, 94, 0.5); box-shadow: 0 0 30px rgba(34, 197, 94, 0.7), inset 0 0 15px rgba(34, 197, 94, 0.5); }
    50% { border-color: rgba(34, 197, 94, 0.9); box-shadow: 0 0 45px rgba(34, 197, 94, 0.9), inset 0 0 20px rgba(34, 197, 94, 0.7); }
    100% { border-color: rgba(34, 197, 94, 0.5); box-shadow: 0 0 30px rgba(34, 197, 94, 0.7), inset 0 0 15px rgba(34, 197, 94, 0.5); }
}

/* Stav AKTIVNÍ (ACTIVE) - při novém přiřazení */
.card.active{ 
background: linear-gradient(145deg, #22c55e, #1a9a4e); /* Plný, jasný zelený gradient */
color: #000; /* Text černej, maximální kontrast */
box-shadow: 0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.6); /* Super zářivá, bílý okraj */
transform: scale(1.08); /* Trochu větší zvětšení */
border-color: #22c55e;
animation: cardActiveScale 1.2s forwards; /* Vlastní animace pro active stav */
}
@keyframes cardActiveScale {
    0% { transform: scale(1); box-shadow: 0 8px 20px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.05); }
    50% { transform: scale(1.1); box-shadow: 0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.6); }
    100% { transform: scale(1.08); box-shadow: 0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.6); }
}

/* LIS text - VYLEPŠENÝ STYL */
.lis {
    font-size: 40px; /* Ještě větší text LIS */
    font-weight: 900; /* Extra bold */
    background: linear-gradient(45deg, #6ee7b7, #34d399); /* Jasnější zelený gradient */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
        6px 6px 12px rgba(0,0,0,0.8), /* Výraznější, hlubší stín */
        8px 8px 16px rgba(0,0,0,0.7);
    transition: all 0.3s ease;
    margin-bottom: 25px; /* Více místa */
}
/* Animace textu LIS při aktivním stavu */
@keyframes lisTextBlink {
    0%, 100% { transform: scale(1); opacity: 1; text-shadow: 6px 6px 12px rgba(0,0,0,0.8); }
    50% { transform: scale(1.1); opacity: 0.9; text-shadow: 8px 8px 16px rgba(0,0,0,0.9); }
    100% { transform: scale(1); opacity: 1; text-shadow: 6px 6px 12px rgba(0,0,0,0.8); } /* Zpět na původní */
}
.card.active .lis {
    animation: lisTextBlink 1.2s ease forwards;
}

/* Styly pro data na kartě - JEŠTĚ VĚTŠÍ PRO TV */
.card .kontakt{font-size:38px;color:#22d3ee; margin-top: 20px; font-weight: 800;} /* Ještě větší */
.card .prurez{font-size:34px;color:#fbbf24; margin-top: 15px; font-weight: 700;} /* Ještě větší */
.card .jmeno{font-size:32px;color:#a3e635; margin-top: 15px; font-weight: 700;} /* Ještě větší */
.card .time{font-size:24px;color:#cbd5f5;margin-top:15px; font-weight: 500;} /* Větší */

.hotovo{ /* Tlačítko HOTOVO - jen pro nastavení, tam myš je */
margin-top:15px;
padding:8px 18px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer;
box-shadow: 0 4px 8px rgba(239, 68, 68, 0.4);
transition: all 0.3s ease;
}
.hotovo:hover {
    background: #dc2626;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(239, 68, 68, 0.6);
}

/* FRONTĚ A JEJÍ POLOŽKY - VYLEPŠENÍ A PULZOVÁNÍ PŘI PŘÍCHODU */
.queue{
background: linear-gradient(145deg, #020617ee, #111827ee); /* Stejný gradient jako karty */
padding:20px;
border-radius:22px;
max-height:80vh;
overflow-y:auto;
box-shadow: 0 8px 20px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.05);
border: 1px solid rgba(34, 197, 94, 0.15);
}
.queue h3, .queueTitle { /* Upraveno pro .queueTitle - název z tvého nového kódu */
    color: #22c55e;
    text-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
    margin-bottom: 15px;
    font-size: 1.8em; /* Větší nadpis fronty */
}

.queueItem{
padding:15px; /* Větší padding */
border-bottom:1px solid #1e293b;
margin-bottom:12px; /* Větší mezera */
position: relative;
background: #020617aa; /* Lehce tmavší pozadí pro položky ve frontě */
border-radius: 8px;
box-shadow: 0 2px 8px rgba(0,0,0,0.3);
font-size: 1.3em; /* Větší text pro položky fronty */
transition: all 0.3s ease-in-out; /* Pro hladké přechody animace */
transform-origin: center center; /* Pro správnou animaci zvětšení */
}
.queueItem:last-child {
    border-bottom: none;
}
.queueItem b { color: #22d3ee; font-size: 1.1em;} /* Barva pro kontakt a mírně větší */
.queueItem .time { color: #cbd5f5; font-size: 0.9em; margin-top: 5px;} /* Trochu větší čas */

/* ANIMACE PŘÍCHOZÍHO POŽADAVKU DO FRONTĚ - NYNÍ ZJEMNĚNÁ VERZE */
.queueItem.new-request-pulse {
    animation: newRequestPulse 4s forwards ease-in-out; /* Animace 4s dopředu */
}
@keyframes newRequestPulse {
    0% {
        background: linear-gradient(145deg, #FFD700, #FFECB3); /* Světlejší žlutá/oranžová */
        box-shadow: 0 0 10px rgba(255, 215, 0, 0.6), 0 0 5px rgba(255, 236, 179, 0.4);
        transform: scale(1.05); /* Jen lehce větší */
        border-color: #FFD700;
        color: #333; /* Tmavší text, ale ne černá */
    }
    50% {
        background: linear-gradient(145deg, #FFECB3, #FFD700); /* Zase o něco světlejší */
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.8), 0 0 8px rgba(255, 236, 179, 0.6);
        transform: scale(1.08); /* Mírně větší pulz, ale stále jemný */
        border-color: #FFD700;
        color: #000;
    }
    100% {
        background: #020617aa; /* Zpět na původní tmavé pozadí */
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        transform: scale(1); /* Zpět na původní velikost */
        border-color: transparent;
        color: white; /* Zpět na bílý text */
    }
}

.assign button{ /* Tlačítka pro přiřazení - tam myš je */
margin:2px;
padding:6px 10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
transition: background 0.2s ease, transform 0.1s ease;
}
.assign button:hover {
    background: #1a9a4e;
    transform: translateY(-1px);
}
.assign .deleteBtn{ /* Název z tvého nového kódu */
background:#ef4444;
}
.assign .deleteBtn:hover {
    background: #dc2626;
}

/* Inputy a Add button v setup screen */
input{ /* Vylepšený styl pro inputy */
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #1e293b;
background: #0f172a;
color: white;
box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
}
.addBtn{ /* Vylepšený styl pro addBtn */
width:100%;
padding:12px;
background: linear-gradient(90deg, #3b82f6, #60a5fa); /* Gradient pro Add button */
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-size: 1.1em;
font-weight: bold;
box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);
transition: all 0.3s ease;
}
.addBtn:hover { /* Hover pro Add button */
    background: linear-gradient(90deg, #60a5fa, #3b82f6);
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(59, 130, 246, 0.6);
}

/* Optimalizace pro mobilní "Požadavky" (requestsScreen) */
#requestsScreen{ /* Název z tvého nového kódu */
    display:flex;
    align-items:center;
    justify-content:center;
    min-height: calc(100vh - 50px);
}
#requestsScreen > div { /* Kontejner pro formulář */
    max-width: 90%; /* Pro mobily širší */
    width: 400px; /* Max šířka pro desktopy */
    margin: 20px auto; /* Centrování a mezera */
    padding: 25px; /* Větší padding */
    background: linear-gradient(145deg, #020617ee, #111827ee);
    border-radius: 22px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.7);
    border: 2px solid rgba(34, 197, 94, 0.5);
    position: relative;
}
#requestsScreen h3 { /* Název z tvého nového kódu */
    color: #22c55e;
    text-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
    margin-bottom: 30px; /* Větší mezera */
    font-size: 2.2em; /* Ještě větší nadpis */
}

/* --- MEDIA QUERY PRO MOBILNÍ TELEFONY (do 600px šířky) --- */
@media screen and (max-width: 600px) {
    #requestsScreen > div {
        width: 95%; /* Zvětšíme šířku na 95% dostupného místa */
        padding: 30px; /* Trochu větší padding */
        margin: 10px auto; /* Mírně menší okraje */
    }
    #requestsScreen h3 {
        font-size: 2.5em; /* Ještě větší nadpis pro lepší čitelnost */
        margin-bottom: 25px;
    }
    input { /* Všechny inputy */
        padding: 15px; /* Větší padding inputů */
        font-size: 1.1em; /* Větší text v inputech */
    }
    .addBtn { /* Tlačítko Odeslat */
        padding: 15px; /* Větší padding tlačítka */
        font-size: 1.2em; /* Větší text tlačítka */
    }
}

/* Popup pro vzkazy (není fullscreen) */
#popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(145deg, #0f4f2c, #1a9a4e);
    color: white;
    padding: 20px 40px;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(34, 197, 94, 0.8);
    font-size: 2em;
    font-weight: bold;
    z-index: 1000;
    text-align: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease-out, visibility 0.3s ease-out;
}
#popup.show {
    opacity: 1;
    visibility: visible;
}

.fullscreenPopup{ /* Původní název z tvého nového kódu */
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:flex;
align-items:center;
justify-content:center;
font-size:80px;
font-weight:bold;
color:#22c55e;
z-index:200;
text-align:center;
padding:40px;
display:none; /* Výchozí skrytí */
}
.production{display:none} /* Název z tvého nového kódu */

/* Styl pro animovaný "létající" prvek */
.flying-request {
    position: fixed;
    z-index: 9999;
    /* NOVÝ VÝCHOZÍ ZELENÝ GRADIENT */
    background: linear-gradient(145deg, #166534, #1a9a4e);
    box-shadow: 0 2px 10px rgba(34, 197, 94, 0.8); /* Jemný stín */
    color: white; /* Výchozí text bílý */
    padding: 10px 15px;
    border-radius: 10px;
    font-size: 1.2em;
    font-weight: bold;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    opacity: 0;
    will-change: transform, opacity, width, height, background, box-shadow, color; /* Vše, co se bude animovat */
    /* Transition se nastavuje v JS dynamicky pro jednotlivé fáze */
}

/* Keyframes pro pulzování středového létajícího požadavku */
@keyframes flyingRequestPulse {
    0%, 100% {
        box-shadow: 0 0 20px rgba(34, 197, 94, 0.7), 0 0 10px rgba(255, 255, 255, 0.3);
        transform: scale(1.1); /* Mírné zvětšení */
    }
    50% {
        box-shadow: 0 0 40px rgba(34, 197, 94, 0.9), 0 0 15px rgba(255, 255, 255, 0.5);
        transform: scale(1.12); /* Ještě mírnější zvětšení */
    }
}

/* Třída pro aplikaci pulzování */
.flying-request.pulsing-center {
    animation: flyingRequestPulse 1.5s infinite alternate ease-in-out;
}

/* Styly pro text uvnitř létajícího prvku (pro snadnější úpravy barev) */
.flying-content {
    text-align: center;
    font-size: 1.2em;
}
.flying-label {
    font-size: 1.5em; /* LIS číslo může být výraznější */
    font-weight: 900; /* Extra bold */
    background: linear-gradient(45deg, #6ee7b7, #34d399); /* Jasnější zelený gradient */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
        1px 1px 2px rgba(0,0,0,0.8), /* Ostřejší a výraznější stín */
        2px 2px 3px rgba(0,0,0,0.6);
    letter-spacing: 1px; /* Jemné rozestupy pro lepší čitelnost */
}
.flying-kontakt {
    font-weight: bold;
    color: #000; /* Černá na zeleném pozadí */
    margin-top: 10px;
}
.flying-prurez {
    color: #333; /* Tmavší šedá */
    font-size: 0.9em;
}
.flying-jmeno {
    color: #555; /* Šedá */
    font-size: 0.8em;
}

/* Specific styling for fullscreen animation */
.flying-request-fullscreen {
    font-size: 68.75px;  /* Z 62.5px na 68.75px (62.5 * 1.1) */
    width: 77.34375vw;    /* Z 70.3125vw na 77.34375vw (70.3125 * 1.1) */
    height: 77.34375vh;   /* Z 70.3125vh na 77.34375vh (70.3125 * 1.1) */
    left: 8vw;     /* Nové centrování: (100 - 77.34375) / 2 = 11.328125 */
    top: 11.328125vh;    /* Nové centrování: (100 - 77.34375) / 2 = 11.328125 */
    padding: 43px; /* Z 39px na 42.9px (zaokrouhleno na 43px) */
    border-radius: 20px;
    opacity: 0;
    transform: scale(0.1);
}
.flying-request-fullscreen .flying-content {
    font-size: 1em; /* Zůstává relativní */
}
.flying-request-fullscreen .flying-label {
    font-size: 1.5em; /* Zůstává relativní */
}
.flying-request-fullscreen .flying-kontakt {
    font-size: 1.3em; /* Zůstává relativní */
}
.flying-request-fullscreen .flying-prurez {
    font-size: 1em; /* Zůstává relativní */
}
.flying-request-fullscreen .flying-jmeno {
    font-size: 1em; /* Zůstává relativní */
    color: #000;
    margin-top: 5px;
}

/* BLINK ANIMACE Z BETA 3.1 */
.blink{animation:blinkAnim 1s infinite;}

@keyframes blinkAnim{
0%{background:#22c55e}
50%{background:#111827}
100%{background:#22c55e}
}
</style>
</head>

<body>

<!-- Přidán div pro popup zprávy -->
<div id="popup"></div>
<!-- Přidán div pro fullscreen popup zprávy -->
<div class="fullscreenPopup" id="fullscreenPopup"></div>

<div class="topbarContainer">
<div class="kemmsTop">KEMMSOFT BETA 4.1 HLAS</div>

<div class="topbar" id="topbar">
<button onclick="setupMode()">Nastavení</button>

const app=initializeApp(firebaseConfig);

const LIS_COUNT=7;
let lisy=[];
let pozadavky=[];
let lastPozadavky = []; // Nové pole pro sledování předchozích požadavků
let lastLisy=[]; // Udržuje předchozí stav LISů pro detekci změn a animace

function emptyLis(){ return {kontakt:"",prurez:"",jmeno:"",time:""} }
function timeNow(){ return new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}) }

// Funkce pro aktualizaci mainHeader a spuštění blinku hlavičky
function updateMainHeaderDisplay(text){
    const header=document.getElementById("mainHeader");
    if(!header) return; // Zajištění, že element existuje

    // Aktualizujeme text pouze pokud se liší, abychom zbytečně nespouštěli animaci
    if (header.innerText !== text) {
        header.innerText = text;
        // Spustíme blink efekt hlavičky, pokud text není "---"
        if (text !== "---") {
            header.classList.add("blink"); 
            // Odstraníme blink po delší době nebo když se text změní na "---"
            setTimeout(() => header.classList.remove("blink"), 8000); // Blink trvá 8s
        } else {
            header.classList.remove("blink"); 
        }
    }
}

// Funkce pro hlasový výstup
let synth = window.speechSynthesis;
let femaleVoice = null;

function loadVoices() {
    // Prohledáváme hlasy. Preferujeme české ženské hlasy, pak obecné ženské, pak Google hlasy.
    // Nakonec se vrátíme k výchozímu.
    const allVoices = synth.getVoices();
    femaleVoice = allVoices.find(voice => voice.lang === "cs-CZ" && (voice.name.includes("Female") || voice.name.includes("Zena") || voice.name.includes("Google Český")));
    if (!femaleVoice) {
        femaleVoice = allVoices.find(voice => (voice.name.includes("Female") || voice.name.includes("Zena") || voice.name.includes("Google")));
    }
    if (!femaleVoice) {
        femaleVoice = allVoices.find(voice => voice.default);
    }
    // Pokud stále žádný, vezmeme první
    if (!femaleVoice && allVoices.length > 0) {
        femaleVoice = allVoices[0];
    }
}

// Načtení hlasů při události voiceschanged nebo ihned, pokud už jsou k dispozici
if (synth) {
    if (synth.onvoiceschanged !== undefined) {
        synth.onvoiceschanged = loadVoices;
    }
    // Načteme hlasy ihned, pokud už jsou načtené
    if (synth.getVoices().length > 0) {
        loadVoices();
    }
}

function speak(text) {
    if (!synth || !femaleVoice) {
        console.warn("SpeechSynthesis není k dispozici nebo nebyl nalezen vhodný hlas.");
        return;
    }
    // Zastavíme případný probíhající řeč
    synth.cancel(); 
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.voice = femaleVoice;
    utterance.lang = femaleVoice.lang || "cs-CZ"; // Použijeme jazyk hlasu, nebo výchozí cs-CZ
    utterance.volume = 1;
    utterance.rate = 1;
    utterance.pitch = 1;
    synth.speak(utterance);
}

// Funkce pro zobrazení zprávy v popupu
function showMessage(message, duration = 3000) {
    const popupEl = document.getElementById('popup');
    if (!popupEl) return;
    popupEl.textContent = message;
    popupEl.classList.add('show');
    setTimeout(() => {
        popupEl.classList.remove('show');
    }, duration);
}

// Funkce pro zobrazení zprávy LIS je připraven
function showLISReady(lisIndex) {
    const message = `LIS ${lisIndex + 1} připraven!`;
    showMessage(message, 2000); // Zobrazí zprávu na 2 sekundy
    speak(message); // A přečte ji
}

onValue(ref(db,'lisy'),async snap=>{ // Asynchronní, protože animace jsou asynchronní
  const data = snap.val();
  const currentLisy = data ? Object.values(data) : Array.from({length:LIS_COUNT},()=>emptyLis());
  
  // Procházíme LISy a detekujeme změny pro blink a animace
  for (let i = 0; i < LIS_COUNT; i++) {
    const lis = currentLisy[i] || emptyLis();
    const oldLis = lastLisy[i] || emptyLis();

    // Spustit blink karty, pokud se LIS obsadil nebo změnil kontakt/průřez/jméno
    const hasContact = !!lis.kontakt;
    const oldHasContact = !!(oldLis && oldLis.kontakt);
    const dataChanged = (hasContact && (!oldHasContact || oldLis.kontakt !== lis.kontakt || oldLis.prurez !== lis.prurez || oldLis.jmeno !== lis.jmeno));
    
    if (hasContact && dataChanged) {
        autoBlink(i); // Spustí blink pro kartu (bez zvuku)
    }
    
    // --- LÉTAJÍCÍ POŽADAVEK ANIMACE ---
    // Spustit animaci, pokud je v LISu nastaveno `assignedAnimation`
    if (lis.assignedAnimation) {
        const reqDetails = lis.assignedAnimation.requestDetails;
        const currentScreenId = document.getElementById("setupScreen").style.display === "block" ? "setupScreen" : 
                                document.getElementById("productionScreen").style.display === "block" ? "productionScreen" :
                                null;

        const targetElement = document.getElementById(`lis${i}`); // Pro obrazovku Nastavení
        const prodTargetElement = document.getElementById(`prodLis${i}`); // Pro Výrobní obrazovku
        
        // Okamžitě aktualizovat mainHeader s textem z animace
        const headerText = `${reqDetails.kontakt} - ${reqDetails.prurez} - ${reqDetails.jmeno} → LIS ${reqDetails.targetLisIndex + 1}`;
        updateMainHeaderDisplay(headerText);

        if (currentScreenId === "productionScreen" && prodTargetElement) {
            await animateFlyingRequestFullscreen(prodTargetElement, reqDetails);
        } else if (currentScreenId === "setupScreen" && targetElement) {
            // Pokusíme se najít zdrojový element ve frontě.
            // Na jiných zařízeních, než které přiřadilo, element ve frontě už nebude,
            // takže animace vyletí ze středu.
            const sourceElement = document.getElementById(`request-${reqDetails.key}`);
            if (sourceElement) {
                await animateFlyingRequest(sourceElement, targetElement, reqDetails);
            } else { // Fallback, pokud zdrojový element už není v DOMu (např. po refresh)
                await animateFlyingRequestFromCenter(targetElement, reqDetails);
            }
        }
        // Důležité: Po spuštění animace (nebo i když se nespustí kvůli neviditelné obrazovce),
        // smažeme assignedAnimation z DB, aby se nespustila znovu při dalším refresh/načtení.
        await update(ref(db, `lisy/${i}`), { assignedAnimation: null });
    }
  }

  lisy = currentLisy;
  while(lisy.length<LIS_COUNT) lisy.push(emptyLis());
  
  lastLisy = JSON.parse(JSON.stringify(lisy)); // Aktualizuje lastLisy pro příští cyklus

  renderAll();
  // updateHeader(); // Již se nevolá zde přímo
});

onValue(ref(db,'pozadavky'), snap => {
  const data = snap.val();
  const currentPozadavky = data ? Object.entries(data).map(([k,v])=>({...v,key:k})).sort((a,b)=>a.time-b.time) : [];
  
  // Detekce nových požadavků pro blikání
  currentPozadavky.forEach(p => {
      // Pokud požadavek s tímto klíčem nebyl v lastPozadavky, je to nový požadavek
      if (!lastPozadavky.some(oldP => oldP.key === p.key)) {
          // Spustíme blikání po krátké prodlevě, aby se element stihl vykreslit
          // Tato logika musí být vyvolána pro OBĚ fronty
          setTimeout(() => {
              const setupQueueItem = document.getElementById(`request-${p.key}`);
              const prodQueueItem = document.getElementById(`prodRequest-${p.key}`); // Pro výrobní frontu

              if (setupQueueItem) {
                  setupQueueItem.classList.add('new-request-pulse');
                  setTimeout(() => {
                      setupQueueItem.classList.remove('new-request-pulse');
                  }, 4000); // Doba trvání animace newRequestPulse
              }
              if (prodQueueItem) { // Pro výrobní frontu
                  prodQueueItem.classList.add('new-request-pulse');
                  setTimeout(() => {
                      prodQueueItem.classList.remove('new-request-pulse');
                  }, 4000); 
              }
          }, 50); 
      }
  });

  pozadavky = currentPozadavky;
  lastPozadavky = JSON.parse(JSON.stringify(currentPozadavky)); // Aktualizujeme lastPozadavky
  renderAll();
});

function renderAll(){
    renderLisy("rowTop","rowBottom",true); // Používáme tvé ID "rowTop", "rowBottom"
    renderLisy("prodTop","prodBottom",false);
    renderQueue("queueList"); // Používáme tvé ID "queueList"
    renderProductionQueue(); // Používáme tvé ID "prodQueue"
}

function renderLisy(topID, bottomID, isSetup){
    const top=document.getElementById(topID);
    const bottom=document.getElementById(bottomID);
    if(!top || !bottom) return;
    top.innerHTML=""; bottom.innerHTML="";

    for(let i=0; i<LIS_COUNT; i++){
        const d = lisy[i] || emptyLis();
        const assigned = d.kontakt !== "";
        // Dynamické ID pro obě obrazovky
        const cardId = isSetup ? `lis${i}` : `prodLis${i}`;
        
        const html = `
            <div class="card ${assigned?'assigned':''}" id="${cardId}">
                <div class="lis">LIS ${i+1}</div>
                <div class="kontakt">${d.kontakt||"---"}</div>
                <div class="prurez">${d.prurez||"---"}</div>
                <div class="jmeno">${d.jmeno||"---"}</div>
                <div class="time">${d.time?timeNow():""}</div>
                ${isSetup ? `<button class="hotovo" onclick="clearLis(${i})">HOTOVO</button>` : ""}
            </div>
        `;
        if(i<3) top.innerHTML += html;
        else bottom.innerHTML += html;
    }
}

function renderProductionQueue(){ /* Funkce z tvého nového kódu */
 const q=document.getElementById("prodQueue");
 if(!q)return;

 q.innerHTML="";

 pozadavky.forEach(p=>{
  q.innerHTML+=`<div class="queueItem" id="prodRequest-${p.key}">

// Funkce assign upravena pro uložení assignedAnimation flagu
window.assignRequest=async function(lisIndex, requestKey){ // Používám "assignRequest" z tvého nového kódu
  const p=pozadavky.find(req => req.key === requestKey);
  if(!p) return;

  await set(ref(db,`lisy/${lisIndex}`),{
    kontakt:p.kontakt,
    prurez:p.prurez,
    jmeno:p.jmeno,
    time:Date.now(),
    assignedAnimation: { 
      targetLisIndex: lisIndex,
      requestDetails: { kontakt: p.kontakt, prurez: p.prurez, jmeno: p.jmeno, key: p.key, targetLisIndex: lisIndex } 
    }
  });
  remove(ref(db,'pozadavky/'+p.key));
}

// ClearLis nyní aktualizuje i mainHeader a zobrazí zprávu "LIS je připraven"
window.clearLis = async function(i){
    await set(ref(db, `lisy/${i}`), emptyLis());
    updateMainHeaderDisplay("---"); // Vyčistíme hlavičku, když se LIS vyčistí
    showLISReady(i); // Zobrazíme zprávu, že LIS je připraven
};

function autoBlink(i){ /* Funkce z tvého nového kódu */
    const card=document.getElementById("lis"+i);
    const prod=document.getElementById("prodLis"+i);
    
    // Pouze vizuální efekt na kartě
    if(card) {
        card.classList.add("active");
        setTimeout(()=>{
            card.classList.remove("active");
            card.classList.add("assigned");
        },1000);
    }
    if(prod) { // blink i na prod kartě
        prod.classList.add("active");
        setTimeout(()=>{
            prod.classList.remove("active");
            prod.classList.add("assigned");
        },1000);
    }
    // playTone(); // Pípnutí je nyní vypnuto
}

// updateHeader() se nyní nevolá přímo z onValue listeneneru pro lisy,
// ale je nahrazena updateMainHeaderDisplay, která je volána přímo z animace
function updateHeader(){ /* Funkce z tvého nového kódu, ale nyní s logikou updateMainHeaderDisplay */
    // Tato funkce je již redundantní, protože updateMainHeaderDisplay přebírá její roli
    // Může být ponechána prázdná nebo odstraněna, protože se volá na konci onValue,
    // ale text je již aktualizován animací. Pokud nejsou animace, tak se nic nestane.
    // Pro jistotu a pro pokrytí případů, kdy by se data jen změnila bez animace:
    const h=document.getElementById("mainHeader");
    let activeLisFound = false;
    for (let i = lisy.length - 1; i >= 0; i--) {
        const d = lisy[i];
        if (d.kontakt) {
            updateMainHeaderDisplay(`${d.kontakt} - ${d.prurez} - ${d.jmeno} → LIS ${i+1}`);
            activeLisFound = true;
            break; 
        }
    }
    if (!activeLisFound) {
        updateMainHeaderDisplay("---");
    }
}

const delay = ms => new Promise(res => setTimeout(res, ms));

async function animateFlyingRequest(sourceEl, targetEl, requestData) {
    const flyingEl = document.createElement('div');
    flyingEl.className = 'flying-request';
    flyingEl.innerHTML = `
        <div class="flying-content">
            <div class="flying-label">LIS ${requestData.targetLisIndex + 1}</div>
            <div class="flying-kontakt">${requestData.kontakt}</div>
            <div class="flying-prurez">${requestData.prurez}</div>
            <div class="flying-jmeno">${requestData.jmeno}</div> <!-- Jmeno zpět -->
        </div>
    `;
    document.body.appendChild(flyingEl);

    const targetLisCard = document.getElementById(`lis${requestData.targetLisIndex}`); // Cílová karta LIS
    const targetRect = targetLisCard.getBoundingClientRect(); // Získání pozice cílové karty
    const sourceRect = sourceEl.getBoundingClientRect();

    // Pevná cílová velikost na středu obrazovky
    const midScreenWidth = 300;
    const midScreenHeight = 120;
    const midX = window.innerWidth / 2 - (midScreenWidth / 2);
    const midY = window.innerHeight / 2 - (midScreenHeight / 2);

    // Krok 1: Inicializace a nastavení počátečního stavu (skrytý, na pozici sourceEl)
    flyingEl.style.left = '0';
    flyingEl.style.top = '0';
    flyingEl.style.width = `${sourceRect.width}px`;
    flyingEl.style.height = `${sourceRect.height}px`;
    flyingEl.style.transform = `translate(${sourceRect.left}px, ${sourceRect.top}px) scale(1)`;
    flyingEl.style.opacity = '0'; // Začínáme s neviditelným prvkem

    await new Promise(requestAnimationFrame);

    // Nastavíme transition pro první fázi (ze zdroje do středu)
    flyingEl.style.transition = `transform 0.8s ease-in-out, opacity 0.8s ease-in-out, width 0.8s ease-in-out, height 0.8s ease-in-out, background 0.8s ease-in-out, box-shadow 0.8s ease-in-out`;

    flyingEl.style.opacity = '1'; // Stane se viditelným
    flyingEl.style.transform = `translate(${midX}px, ${midY}px) scale(1.1)`; // Let do středu a mírné zvětšení
    flyingEl.style.width = `${midScreenWidth}px`;
    flyingEl.style.height = `${midScreenHeight}px`;

    // --- STYLY PRO STŘEDOVÝ STAV (ZELENÝ, PULZUJÍCÍ) --- aplikované hned s příchodem na střed
    flyingEl.style.background = 'linear-gradient(145deg, #22c55e, #1a9a4e)'; /* Zelený gradient */
    flyingEl.style.boxShadow = '0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.6)'; /* Zářivý stín */
    flyingEl.classList.add('pulsing-center'); // Aktivujeme pulzující animaci

    // Spustit hlas po příchodu na střed
    speak(`Kontakt ${requestData.kontakt}, jméno ${requestData.jmeno}`);

    // Čekáme na dokončení první fáze animace
    await new Promise(res => flyingEl.addEventListener('transitionend', res, { once: true }));

    // Krok 2: Pauza uprostřed s pulzováním
    await delay(3000); // Přesně 3 sekundy pauza
    flyingEl.classList.remove('pulsing-center'); // Vypneme pulzování

    // Krok 3: Let z centra do cílového LISu
    const finalScale = 0.5; // Zmenšení při dosednutí do LISu
    const finalX = targetRect.left + (targetRect.width / 2) - (midScreenWidth * finalScale / 2);
    const finalY = targetRect.top + (targetRect.height / 2) - (midScreenHeight * finalScale / 2);

    // Nastavení transition pro druhou fázi přeletu (ze středu do cíle)
    flyingEl.style.transition = `transform 0.8s ease-in-out, opacity 0.8s ease-in-out, width 0.8s ease-in-out, height 0.8s ease-in-out, background 0.8s ease-in-out, box-shadow 0.8s ease-in-out`;
    flyingEl.style.transform = `translate(${finalX}px, ${finalY}px) scale(${finalScale})`;
    flyingEl.style.width = `${midScreenWidth * finalScale}px`;
    flyingEl.style.height = `${midScreenHeight * finalScale}px`;
    flyingEl.style.opacity = '0'; // Zprůhledníme prvek
    flyingEl.style.background = 'transparent';
    flyingEl.style.boxShadow = 'none';

    // Čekáme na dokončení druhé fáze animace, pak prvek odstraníme
    await new Promise(res => flyingEl.addEventListener('transitionend', res, { once: true }));
    flyingEl.remove();
}

async function animateFlyingRequestFromCenter(targetEl, requestData) {
    const flyingEl = document.createElement('div');
    flyingEl.className = 'flying-request';
    flyingEl.innerHTML = `
        <div class="flying-content">
            <div class="flying-label">LIS ${requestData.targetLisIndex + 1}</div>
            <div class="flying-kontakt">${requestData.kontakt}</div>
            <div class="flying-prurez">${requestData.prurez}</div>
            <div class="flying-jmeno">${requestData.jmeno}</div> <!-- Jmeno zpět -->
        </div>
    `;
    document.body.appendChild(flyingEl);

    const targetRect = targetEl.getBoundingClientRect();

    const midScreenWidth = 300; 
    const midScreenHeight = 120;
    const midX = window.innerWidth / 2 - (midScreenWidth / 2);
    const midY = window.innerHeight / 2 - (midScreenHeight / 2);

    flyingEl.style.left = '0';
    flyingEl.style.top = '0';
    flyingEl.style.width = `${midScreenWidth}px`; 
    flyingEl.style.height = `${midScreenHeight}px`; 
    flyingEl.style.transform = `translate(${midX}px, ${midY}px) scale(0)`; 
    flyingEl.style.opacity = '0'; 

    await new Promise(requestAnimationFrame);

    flyingEl.style.transition = `transform 0.8s ease-in-out, opacity 0.8s ease-in-out, width 0.8s ease-in-out, height 0.8s ease-in-out, background 0.8s ease-in-out, box-shadow 0.8s ease-in-out`;
    flyingEl.style.background = 'linear-gradient(145deg, #22c55e, #1a9a4e)'; 
    flyingEl.style.boxShadow = '0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.6)';
    flyingEl.style.transform = `translate(${midX}px, ${midY}px) scale(1.1)`; 
    flyingEl.style.opacity = '1';
    flyingEl.classList.add('pulsing-center');

    // Spustit hlas po příchodu na střed
    speak(`Kontakt ${requestData.kontakt}, jméno ${requestData.jmeno}`);

    await new Promise(res => flyingEl.addEventListener('transitionend', res, { once: true }));
    await delay(3000); 
    flyingEl.classList.remove('pulsing-center');

    const finalScale = 0.5;
    const finalX = targetRect.left + (targetRect.width / 2) - (midScreenWidth * finalScale / 2);
    const finalY = targetRect.top + (targetRect.height / 2) - (midScreenHeight * finalScale / 2);

    flyingEl.style.transition = `transform 0.8s ease-in-out, opacity 0.8s ease-in-out, width 0.8s ease-in-out, height 0.8s ease-in-out, background 0.8s ease-in-out, box-shadow 0.8s ease-in-out`;
    flyingEl.style.transform = `translate(${finalX}px, ${finalY}px) scale(${finalScale})`;
    flyingEl.style.opacity = '0'; 
    flyingEl.style.background = 'transparent';
    flyingEl.style.boxShadow = 'none';

    await new Promise(res => flyingEl.addEventListener('transitionend', res, { once: true }));
    flyingEl.remove();
}

async function animateFlyingRequestFullscreen(targetEl, requestData) {
    const fullscreenPopupEl = document.getElementById('fullscreenPopup'); // Použijeme fullscreen popup
    if (!fullscreenPopupEl) return;

    // Skryjeme normální létající element, protože teď využíváme fullscreen popup
    const flyingEl = document.createElement('div'); // Dočasný element pro hlasovou syntézu
    flyingEl.className = 'flying-request'; // Jen pro zkopírování stylů, ale nebude zobrazen
    flyingEl.innerHTML = `
        <div class="flying-content">
            <div class="flying-label">LIS ${requestData.targetLisIndex + 1}</div>
            <div class="flying-kontakt">${requestData.kontakt}</div>
            <div class="flying-prurez">${requestData.prurez}</div>
            <div class="flying-jmeno">${requestData.jmeno}</div>
        </div>
    `;
    document.body.appendChild(flyingEl); // Přidáme jen kvůli CSS stylům pro flying-request-fullscreen

    fullscreenPopupEl.innerHTML = `
        <div class="flying-content">
            <div class="flying-label">LIS ${requestData.targetLisIndex + 1}</div>
            <div class="flying-kontakt">${requestData.kontakt}</div>
            <div class="flying-prurez">${requestData.prurez}</div>
            <div class="flying-jmeno">${requestData.jmeno}</div>
        </div>
    `;
    fullscreenPopupEl.style.display = 'flex'; // Zobrazíme fullscreen popup

    // Použijeme styly z .flying-request-fullscreen pro fullscreenPopupEl
    const tempFlyingDiv = document.createElement('div');
    tempFlyingDiv.className = 'flying-request-fullscreen';
    document.body.appendChild(tempFlyingDiv);
    const computedStyle = getComputedStyle(tempFlyingDiv);
    
    // Aplikujeme jen některé styly z flying-request-fullscreen, hlavně velikost a pozici
    fullscreenPopupEl.style.fontSize = computedStyle.fontSize;
    fullscreenPopupEl.style.width = computedStyle.width;
    fullscreenPopupEl.style.height = computedStyle.height;
    fullscreenPopupEl.style.left = computedStyle.left;
    fullscreenPopupEl.style.top = computedStyle.top;
    fullscreenPopupEl.style.padding = computedStyle.padding;
    fullscreenPopupEl.style.borderRadius = computedStyle.borderRadius;

    fullscreenPopupEl.style.opacity = '0';
    fullscreenPopupEl.style.transform = 'scale(0.1)';

    tempFlyingDiv.remove(); // Odstraníme dočasný element

    // Fáze 1: Objeví se a zvětší na fullscreen
    fullscreenPopupEl.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out, background 0.5s ease-out, box-shadow 0.5s ease-out';
    
    await new Promise(requestAnimationFrame);

    fullscreenPopupEl.style.opacity = '1';
    fullscreenPopupEl.style.transform = 'scale(1)'; 
    fullscreenPopupEl.style.background = 'linear-gradient(45deg, #22c55e, #34d399)'; 
    fullscreenPopupEl.style.boxShadow = '0 0 50px rgba(34, 197, 94, 0.9), 0 0 20px rgba(255,255,255,0.6)';
    fullscreenPopupEl.classList.add('pulsing-center'); // Aktivujeme pulzující animaci i pro fullscreen

    // Spustit hlas po příchodu na fullscreen
    speak(`Kontakt ${requestData.kontakt}, jméno ${requestData.jmeno}`);

    await delay(5000); // Zůstane fullscreen na 5 SEKUND
    fullscreenPopupEl.classList.remove('pulsing-center'); // Vypneme pulzování

    const targetRect = targetEl.getBoundingClientRect();
    const targetLisIndex = requestData.targetLisIndex;
    const currentLisData = lisy[targetLisIndex]; 
    const finalBackground = currentLisData && currentLisData.kontakt ? 'linear-gradient(145deg, #16653499, #1a9a4e99)' : 'linear-gradient(145deg, #020617ee, #111827ee)'; 

    const finalX = targetRect.left;
    const finalY = targetRect.top;
    const finalWidth = targetRect.width;
    const finalHeight = targetRect.height;
    const finalBorderRadius = parseFloat(getComputedStyle(targetEl).borderRadius);
    
    fullscreenPopupEl.style.transition = 'all 0.8s ease-in-out';
    
    fullscreenPopupEl.style.left = `${finalX}px`;
    fullscreenPopupEl.style.top = `${finalY}px`;
    fullscreenPopupEl.style.width = `${finalWidth}px`;
    fullscreenPopupEl.style.height = `${finalHeight}px`;
    fullscreenPopupEl.style.fontSize = `1.2em`; 
    fullscreenPopupEl.style.borderRadius = `${finalBorderRadius}px`;
    fullscreenPopupEl.style.background = finalBackground; 
    fullscreenPopupEl.style.boxShadow = '0 8px 20px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.05)';
    fullscreenPopupEl.style.opacity = '0'; 
    fullscreenPopupEl.style.transform = 'scale(0.8)'; 
    fullscreenPopupEl.innerHTML = '';
    
    await new Promise(res => fullscreenPopupEl.addEventListener('transitionend', res, { once: true }));
    fullscreenPopupEl.style.display = 'none'; // Skryjeme fullscreen popup
}

// Navigační funkce - nyní používají názvy obrazovek z tvého HTML
window.setupMode=function(){
    document.getElementById("setupScreen").style.display="block";
    document.getElementById("productionScreen").style.display="none";
    document.getElementById("requestsScreen").style.display="none";
    document.querySelector(".topbarContainer").classList.remove("hidden"); // Zobrazení topbaru
    document.getElementById("mainHeader").style.display = "flex"; // Zobrazení hlavního headeru
    setActiveNavButton("setupMode");
    // updateHeader(); // Již se nevolá zde přímo
}

window.productionMode=function(){
    document.getElementById("setupScreen").style.display="none";
    document.getElementById("productionScreen").style.display="block";
    document.getElementById("requestsScreen").style.display="none";
    document.querySelector(".topbarContainer").classList.remove("hidden"); // Zobrazení topbaru
    document.getElementById("mainHeader").style.display = "flex"; // Zobrazení hlavního headeru
    setActiveNavButton("productionMode");
    // updateHeader(); // Již se nevolá zde přímo
}

window.requestsMode=function(){
    document.getElementById("setupScreen").style.display="none";
    document.getElementById("productionScreen").style.display="none";
    document.getElementById("requestsScreen").style.display="block";
    document.querySelector(".topbarContainer").classList.add("hidden"); // Skrytí topbaru
    document.getElementById("mainHeader").style.display = "none"; // Skrytí hlavního headeru
    setActiveNavButton("requestsMode");
    // updateHeader(); // Již se nevolá zde přímo
}

// Funkce pro nastavení aktivního tlačítka navigace
let currentActiveButton = null;
function setActiveNavButton(modeFunction) {
    if (currentActiveButton) {
        currentActiveButton.classList.remove('active-nav');
    }
    // Používáme topbar button (z tvého nového kódu)
    const newActiveButton = document.querySelector(`.topbar button[onclick*="${modeFunction}"]`);
    if (newActiveButton) {
        newActiveButton.classList.add('active-nav');
        currentActiveButton = newActiveButton;
    }
}

// Startovací logika při načtení stránky
window.addEventListener("load",()=>{
    // Pokud je v URL parametr "pozadavky", přepneme na requestsMode
    if(window.location.search.includes("pozadavky")){
        requestsMode();
    } else {
        setupMode(); // Jinak výchozí je setupMode
    }
});

setInterval(()=>{
  const production = document.getElementById("productionScreen"); /* Název z tvého nového kódu */
  if(production.style.display !== "block") return;
  const q = production.querySelector(".queue");
  if(!q) return;
  q.scrollTop += 1;
  if(q.scrollTop + q.clientHeight >= q.scrollHeight) q.scrollTop = 0;
},100);
