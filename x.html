<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KemmSoft Press - VIDEO WIDGETS</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.3/dist/quagga.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-green: #22c55e;
            --neon-blue: #3b82f6;
            --card-bg: rgba(7, 12, 26, 0.4); 
        }

        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: transparent;
            color: white;
            font-family: 'Orbitron', sans-serif; overflow: hidden;
        }

        #video-background {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -10;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: -5;
        }

        .topbar {
            position: fixed; top: 0; left: 0; right: 0; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; background: rgba(0, 0, 0, 0.7);
            border-bottom: 2px solid var(--neon-green); z-index: 1000;
        }

        .btn {
            background: transparent; border: 2px solid var(--neon-green);
            color: var(--neon-green); padding: 10px 20px; cursor: pointer;
            font-family: 'Orbitron'; font-weight: bold; border-radius: 8px;
            transition: 0.3s; font-size: 13px;
        }
        .btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 15px var(--neon-green); }

        .screen {
            position: absolute; top: 80px; left: 0; right: 0; bottom: 0;
            opacity: 0; visibility: hidden; transition: opacity 1s;
        }
        .screen.active { opacity: 1; visibility: visible; }

        .carousel-container { height: 100%; display: flex; align-items: center; overflow: hidden; }
        .carousel-track {
            display: flex; 
            gap: 75px;
            padding: 0 100px;
            animation: scroll-track 45s linear infinite; 
            width: max-content;
        }
        @keyframes scroll-track { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .machine-card {
            min-width: 562px;
            height: 687px;    
            background: var(--card-bg);
            border-radius: 50px; 
            border: 2px solid rgba(255,255,255,0.2);
            padding: 40px 50px; 
            display: flex; flex-direction: column; justify-content: space-between;
            backdrop-filter: blur(15px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            position: relative;
        }
        .machine-card.assigned { border-color: var(--neon-green); box-shadow: 0 0 35px rgba(34, 197, 94, 0.3); }

        .machine-id { 
            font-size: 125px;
            text-align: center; color: var(--neon-green); font-weight: 900; margin: 0; 
        }
        
        .data-row {
            background: rgba(0,0,0,0.5); padding: 25px 31px; 
            border-radius: 20px;
            border-left: 7px solid var(--neon-green);
        }
        .data-row.blue { border-left-color: var(--neon-blue); }
        .label { font-size: 15px; color: var(--neon-green); letter-spacing: 2px; }
        .value { font-size: 47px; font-weight: bold; color: white; }

        /* --- ÚPRAVA: Styl pro zobrazení času --- */
        .timestamp {
            font-size: 32px;
            color: rgba(255, 255, 255, 0.5);
            text-align: right;
            margin-top: -10px;
            font-style: italic;
        }

        #imageViewport { width: 100vw; height: 100vh; background: black; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .doc-image { 
            width: 100vw; height: 100vh;
            display: none; 
            object-fit: contain; 
            animation: fadeIn 0.8s ease-in-out;
        }
        .doc-image.visible { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .input-box { background: #1e293b; padding: 40px; border-radius: 25px; border: 2px solid var(--neon-green); width: 450px; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #020617; border: 1px solid var(--neon-green); color: white; border-radius: 10px; font-family: 'Orbitron'; font-size: 18px; }

        .timer-bar { position: fixed; bottom: 0; left: 0; height: 8px; background: var(--neon-blue); width: 0%; z-index: 2000; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="video-background">
        <source src="pozadi.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="timer-bar" id="timerBar"></div>

    <div class="topbar">
        <div style="font-weight: 900; font-size: 24px;">KEMMSOFT <span style="color:var(--neon-green)">PRESS</span></div>
        <div style="display: flex; gap: 15px;">
            <button class="btn" onclick="openQrScanner()">📷 SKENOVAT</button>
            <button class="btn" onclick="openManualInput()">⌨️ RUČNĚ</button>
            <button id="autoBtn" class="btn" onclick="toggleRotation()">AUTOPILOT: ON</button>
        </div>
    </div>

    <div id="productionScreen" class="screen active">
        <div class="carousel-container">
            <div id="carouselTrack" class="carousel-track"></div>
        </div>
    </div>

    <div id="presentationScreen" class="screen">
        <div id="imageViewport">
            <img src="lis1.jpg" class="doc-image visible" id="img1">
            <img src="lis2.jpg" class="doc-image" id="img2">
            <img src="lis3.jpg" class="doc-image" id="img3">
            <img src="lis4.jpg" class="doc-image" id="img4">
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div id="interactive" style="width: 80%; max-width: 500px;"><video id="v" style="width:100%; border: 2px solid var(--neon-green); border-radius: 15px;"></video></div>
        <button class="btn" style="margin-top:20px" onclick="closeQrScanner()">ZAVŘÍT</button>
    </div>

    <div id="dataModal" class="modal">
        <div class="input-box">
            <h2 style="color:var(--neon-green); text-align:center;">ZADÁNÍ DAT</h2>
            <select id="mSelect"></select>
            <input type="text" id="oIn" placeholder="ZAKÁZKA">
            <input type="text" id="tIn" placeholder="NÁSTROJ">
            <button class="btn" style="width:100%; background:var(--neon-green); color:black; margin-top:15px;" onclick="saveData()">ULOŽIT</button>
            <button class="btn" style="width:100%; margin-top:10px; border-color:red; color:red;" onclick="closeDataModal()">ZRUŠIT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhiCfh-Di_NdPO5rGM7CZFQGaSymcdWxI",
            authDomain: "lisyweb-df6d9.firebaseapp.com",
            databaseURL: "https://lisyweb-df6d9-default-rtdb.firebaseio.com/",
            projectId: "lisyweb-df6d9"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.addEventListener('load', () => { 
            const v = document.getElementById('video-background');
            v.play().catch(() => { console.log("Video čeká na interakci"); });
        });

        const MACHINE_IDS = ["5-13", "5-15", "5-16", "5-17", "5-18", "5-19", "5-20", "5-21", "5-26"];
        let machines = [];
        let sec = 0;
        const LIMIT = 90; 
        let rotActive = true;
        let currentImgIndex = 1;
        const totalImages = 4;
        const intervalObrázků = 10; 
        let imgTimer = 0;

        function rotateImages() {
            if(rotActive && document.getElementById("presentationScreen").classList.contains("active")) {
                imgTimer++;
                if(imgTimer >= intervalObrázků) {
                    imgTimer = 0;
                    const oldImg = document.getElementById(`img${currentImgIndex}`);
                    if(oldImg) oldImg.classList.remove("visible");
                    currentImgIndex++;
                    if(currentImgIndex > totalImages) currentImgIndex = 1;
                    const newImg = document.getElementById(`img${currentImgIndex}`);
                    if(newImg) newImg.classList.add("visible");
                }
            }
        }

        onValue(ref(db, 'machines'), snap => {
            const data = snap.val();
            machines = MACHINE_IDS.map((id, i) => ({
                // ÚPRAVA: Přidáno pole 'lastUpdate' do objektu stroje
                ...(data && data[i] ? data[i] : { orderNumber: "", toolNumber: "", lastUpdate: "" }), id, i
            }));
            render();
            document.getElementById("mSelect").innerHTML = MACHINE_IDS.map((id, i) => `<option value="${i}">${id}</option>`).join('');
        });

        function render() {
            const track = document.getElementById("carouselTrack");
            const html = machines.map(m => `
                <div class="machine-card ${m.orderNumber ? 'assigned' : ''}" onclick="quickEdit(${m.i})">
                    <h1 class="machine-id">${m.id}</h1>
                    <div class="data-row"><div class="label">ZAKÁZKA</div><div class="value">${m.orderNumber || '---'}</div></div>
                    <div class="data-row blue"><div class="label">NÁSTROJ</div><div class="value">${m.toolNumber || '---'}</div></div>
                    <div class="timestamp">${m.lastUpdate ? 'Zadáno: ' + m.lastUpdate : ''}</div>
                </div>
            `).join('');
            track.innerHTML = html + html;
        }

        window.quickEdit = (i) => {
            document.getElementById("mSelect").value = i;
            document.getElementById("oIn").value = machines[i].orderNumber;
            document.getElementById("tIn").value = machines[i].toolNumber;
            document.getElementById("dataModal").style.display = "flex";
        };
        window.openManualInput = () => document.getElementById("dataModal").style.display = "flex";
        window.closeDataModal = () => document.getElementById("dataModal").style.display = "none";
        
        // ÚPRAVA: Funkce saveData nyní ukládá i aktuální čas
        window.saveData = async () => {
            const i = document.getElementById("mSelect").value;
            const now = new Date();
            const timeString = now.toLocaleDateString('cs-CZ') + " " + now.toLocaleTimeString('cs-CZ', {hour: '2-digit', minute:'2-digit'});
            
            await set(ref(db, `machines/${i}`), { 
                orderNumber: document.getElementById("oIn").value, 
                toolNumber: document.getElementById("tIn").value,
                lastUpdate: timeString // Uložení času
            });
            closeDataModal();
        };

        window.toggleRotation = () => {
            rotActive = !rotActive;
            document.getElementById("autoBtn").innerText = "AUTOPILOT: " + (rotActive ? "ON" : "OFF");
        };

        setInterval(() => {
            if(rotActive) {
                sec++;
                rotateImages();
                document.getElementById("timerBar").style.width = (sec/LIMIT*100) + "%";
                if(sec >= LIMIT) { 
                    sec = 0; 
                    imgTimer = 0; 
                    switchScreen(); 
                }
            }
        }, 1000);

        function switchScreen() {
            const prod = document.getElementById("productionScreen");
            const pres = document.getElementById("presentationScreen");
            if(prod.classList.contains("active")) { prod.classList.remove("active"); pres.classList.add("active"); }
            else { pres.classList.remove("active"); prod.classList.add("active"); }
        }

        window.openQrScanner = () => {
            document.getElementById("qrModal").style.display = "flex";
            Quagga.init({ inputStream: { type: "LiveStream", target: document.querySelector('#v'), constraints: { facingMode: "environment" } }, decoder: { readers: ["qr_code_reader", "code_128_reader"] } }, (err) => { if(!err) Quagga.start(); });
            Quagga.onDetected(res => { const i = MACHINE_IDS.indexOf(res.codeResult.code); if(i !== -1) { closeQrScanner(); quickEdit(i); } });
        };
        window.closeQrScanner = () => { Quagga.stop(); document.getElementById("qrModal").style.display = "none"; };
    </script>
</body>
</html>
