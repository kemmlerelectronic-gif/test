<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Řízení lisů – reálný čas</title>

<style>
body{font-family:Segoe UI,Arial;background:#0b1220;color:white;margin:0;padding:20px;}

.topbarContainer{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;}
.topbar{text-align:center;}

.deleteBtn{
 margin:2px;
 padding:4px 8px;
 background:#ef4444;
 border:none;
 border-radius:4px;
 color:white;
 cursor:pointer;
 font-size:12px;
}

.topbar button{
padding:10px 20px;
margin:5px;
background:#22c55e;
border:none;
border-radius:8px;
font-size:16px;
color:white;
cursor:pointer;
}

.kemmsTop{
font-size:34px;
color:#32c65e;
font-weight:bold;
margin-left:10px;
}

.header{
text-align:center;
font-size:90px;
font-weight:bold;
margin-bottom:20px;
background:#374151;
padding:15px;
border-radius:12px;
}

.layout{
display:grid;
grid-template-columns:4fr 1.4fr;
gap:25px;
}

.rowTop{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:20px;
}

.rowBottom{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:#111827;
padding:30px;
border-radius:20px;
text-align:center;
transition: transform 0.3s, box-shadow 0.3s, background 1s;
}

.card.active{
box-shadow:0 0 30px #22c55e;
transform:scale(1.05);
background:#22c55e;
}

.card.assigned{
background:#22c55e33;
}

.lis{font-size:34px;font-weight:bold;margin-bottom:10px;}
.kontakt{font-size:34px;color:#22d3ee;}
.prurez{font-size:34px;color:#fbbf24;}
.jmeno{font-size:34px;color:#a3e635;margin-top:6px;}
.time{font-size:20px;color:#ccc;margin-top:4px;}

.hotovo{
margin-top:12px;
padding:8px 16px;
background:#ef4444;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.queue{
background:#020617;
padding:20px;
border-radius:20px;
}

.queueTitle{
font-size:32px;  
margin-bottom:10px;
}

.queueItem{
padding:28px;
border-bottom:1px solid #1e293b;
margin-bottom:10px;
    font-size:28px;
}

.assign button{
margin:2px;
padding:4px 8px;
background:#22c55e;
border:none;
border-radius:4px;
color:white;
cursor:pointer;
font-size:12px;
}

input{
width:100%;
padding:8px;
margin-bottom:6px;
border-radius:6px;
border:none;
}

.addBtn{
width:100%;
padding:10px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.production{display:none;}

.queue.requestsHidden{
display:none; /* SKRYJE seznam požadavků v "Zadání požadavku" */
}

.blink{animation:blinkAnim 1s infinite;}

@keyframes blinkAnim{
0%{background:#22c55e}
50%{background:#111827}
100%{background:#22c55e}
}
</style>
</head>

<body>

<div class="topbarContainer">
<div class="kemmsTop">KEMMSOFT BETA 3.1</div>

<div class="topbar" id="topbar">
<button onclick="setupMode()">Nastavení</button>
<button onclick="productionMode()">Výrobní obrazovka</button>
<button onclick="requestsMode()">Zadání požadavku</button>
</div>
</div>

<div class="header" id="mainHeader">---</div>

<div id="setupScreen">
<div class="layout">

<div>
<div class="rowTop" id="rowTop"></div>
<div class="rowBottom" id="rowBottom"></div>
</div>

<div class="queue">
<div class="queueTitle">Nadcházející požadavky</div>
<div id="queueList"></div>

<h4>Přidat nový požadavek</h4>

<input id="setupKontakt" placeholder="Číslo kontaktu">
<input id="setupPrurez" placeholder="Průřez">
<input id="setupJmeno" placeholder="Jméno">

<button class="addBtn" onclick="addRequestSetup()">Odeslat</button>

</div>
</div>
</div>

<div id="productionScreen" class="production">
<div class="layout">

<div>
<div class="rowTop" id="prodTop"></div>
<div class="rowBottom" id="prodBottom"></div>
</div>

<div class="queue">
<div class="queueTitle">Nadcházející požadavky</div>
<div id="prodQueue"></div>
</div>

</div>
</div>

<div id="requestsScreen" class="production">

<div style="max-width:420px;margin:0 auto;">

<h3>Zadání požadavku</h3>

<input id="kontakt" placeholder="Číslo kontaktu">
<input id="prurez" placeholder="Průřez">
<input id="jmeno" placeholder="Jméno">

<button class="addBtn" onclick="addRequest()">Odeslat</button>

<!-- SEZNAM POŽADAVKŮ JE SKRYTÝ -->
<div class="queue requestsHidden" style="margin-top:20px;">
<div class="queueTitle">Požadavky</div>
<div id="queueListRequests"></div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAhiCfh-Di_NdPO5rGM7CZFQGaSymcdWxI",
authDomain: "lisyweb-df6d9.firebaseapp.com",
databaseURL: "https://lisyweb-df6d9-default-rtdb.firebaseio.com/",
projectId: "lisyweb-df6d9",
storageBucket: "lisyweb-df6d9.firebasestorage.app",
messagingSenderId: "798030762865",
appId: "1:798030762865:web:14786bb2fb4ac6211d1cd0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const LIS_COUNT = 7;

let lisy=[];
let pozadavky=[];
let lastLisy=[];

function emptyLis(){ return {kontakt:"",prurez:"",jmeno:"",time:""} }

onValue(ref(db,'lisy'),snapshot=>{
    const data=snapshot.val();
    lisy=data?Object.values(data):Array.from({length:LIS_COUNT},()=>emptyLis());
    lisy.forEach((lis,i)=>{
        const old=lastLisy[i];
        if(lis.kontakt && (!old || old.kontakt!==lis.kontakt)){
            autoBlink(i);
        }
    });
    lastLisy=JSON.parse(JSON.stringify(lisy));
    renderLisy();
    renderProduction();
});

onValue(ref(db,'pozadavky'),snapshot=>{
    const data=snapshot.val();
    pozadavky=data?Object.entries(data).map(([key,val])=>({...val,key})).sort((a,b)=>a.time-b.time):[];
    renderQueue();
    renderProductionQueue();
    renderQueueRequests();
});

function renderLisy(){
    const top=document.getElementById("rowTop");
    const bottom=document.getElementById("rowBottom");
    top.innerHTML="";
    bottom.innerHTML="";
    for(let i=0;i<3;i++)top.innerHTML+=card(i);
    for(let i=3;i<7;i++)bottom.innerHTML+=card(i);
    function card(i){
        const d=lisy[i]||emptyLis();
        return `<div class="card ${d.kontakt?"assigned":""}" id="lis${i}">
            <div class="lis">LIS ${i+1}</div>
            <div class="kontakt">${d.kontakt||"---"}</div>
            <div class="prurez">${d.prurez||"---"}</div>
            <div class="jmeno">${d.jmeno||"---"}</div>
            <div class="time">${d.time?new Date(d.time).toLocaleTimeString():""}</div>
            <button class="hotovo" onclick="clearLis(${i})">HOTOVO</button>
        </div>`;
    }
}

function renderProduction(){
    const top=document.getElementById("prodTop");
    const bottom=document.getElementById("prodBottom");
    top.innerHTML="";
    bottom.innerHTML="";
    for(let i=0;i<3;i++)top.innerHTML+=card(i);
    for(let i=3;i<7;i++)bottom.innerHTML+=card(i);
    function card(i){
        const d=lisy[i]||emptyLis();
        return `<div class="card ${d.kontakt?"assigned":""}" id="prodLis${i}">
            <div class="lis">LIS ${i+1}</div>
            <div class="kontakt">${d.kontakt||"---"}</div>
            <div class="prurez">${d.prurez||"---"}</div>
            <div class="jmeno">${d.jmeno||"---"}</div>
            <div class="time">${d.time?new Date(d.time).toLocaleTimeString():""}</div>
        </div>`;
    }
}

function renderQueueRequests(){
 const q = document.getElementById("queueListRequests");
 if(!q) return;

 q.innerHTML="";

 pozadavky.forEach((p,i)=>{
  q.innerHTML += `<div class="queueItem">
   <b>${p.kontakt}</b> - ${p.prurez} - ${p.jmeno}
<span class="time">${new Date(p.time).toLocaleTimeString()}</span>

   <div class="assign">
    ${[0,1,2,3,4,5,6].map(l=>`<button onclick="assignRequest(${l}, ${i})">L${l+1}</button>`).join('')}
    <button class="deleteBtn" onclick="deleteRequest('${p.key}')">❌</button>
   </div>

  </div>`;
 });
}
function renderQueue(){
 const q=document.getElementById("queueList");
 if(!q) return;

 q.innerHTML="";

 pozadavky.forEach((p,i)=>{
  q.innerHTML+=`<div class="queueItem">
  <b>${p.kontakt}</b> - ${p.prurez} - ${p.jmeno}
<span class="time">${new Date(p.time).toLocaleTimeString()}</span>

   <div class="assign">
    ${[0,1,2,3,4,5,6].map(l=>`<button onclick="assignRequest(${l}, ${i})">L${l+1}</button>`).join('')}
    <button class="deleteBtn" onclick="deleteRequest('${p.key}')">❌</button>
   </div>

  </div>`;
 });
}

function renderProductionQueue(){
 const q=document.getElementById("prodQueue");
 if(!q)return;

 q.innerHTML="";

 pozadavky.forEach(p=>{
  q.innerHTML+=`<div class="queueItem">
   <b>${p.kontakt}</b> - ${p.prurez} - ${p.jmeno}
   <div class="time">${new Date(p.time).toLocaleTimeString()}</div>
  </div>`;
 });
}

window.addRequest=function(){

 const kontaktInput=document.getElementById("kontakt");
 const prurezInput=document.getElementById("prurez");
 const jmenoInput=document.getElementById("jmeno");

 const kontakt=kontaktInput.value;
 const prurez=prurezInput.value;
 const jmeno=jmenoInput.value;

 if(!kontakt) return;

 const newRef=push(ref(db,'pozadavky'));
 set(newRef,{kontakt,prurez,jmeno,time:Date.now()});

 // vymazání formuláře
 kontaktInput.value="";
 prurezInput.value="";
 jmenoInput.value="";

 // kurzor zpět do prvního pole
 kontaktInput.focus();
}

window.addRequestSetup=function(){
    const kontakt=document.getElementById("setupKontakt").value;
    const prurez=document.getElementById("setupPrurez").value;
    const jmeno=document.getElementById("setupJmeno").value;
    if(!kontakt) return;
    const newRef=push(ref(db,'pozadavky'));
    set(newRef,{kontakt,prurez,jmeno,time:Date.now()});
}

window.assignRequest=function(lisIndex, requestIndex){
    const p = pozadavky[requestIndex];
    if(!p) return;
    set(ref(db,`lisy/${lisIndex}`),{
        kontakt:p.kontakt,
        prurez:p.prurez,
        jmeno:p.jmeno,
        time:Date.now()
    });
    remove(ref(db,`pozadavky/${p.key}`));
}

window.clearLis=function(i){
    set(ref(db,`lisy/${i}`),emptyLis());

}
window.deleteRequest=function(key){
 remove(ref(db,'pozadavky/'+key));
}

function autoBlink(i){
    const card=document.getElementById("lis"+i);
    const prod=document.getElementById("prodLis"+i);
    [card,prod].forEach(c=>c?.classList.add("active"));
    playTone();
    setTimeout(()=>{
        [card,prod].forEach(c=>{
            c?.classList.remove("active");
            c?.classList.add("assigned");
        });
    },1000);
    updateHeader(i);
}

function updateHeader(i){
    const h=document.getElementById("mainHeader");
    const d=lisy[i];
    h.innerText=`${d.kontakt} - ${d.prurez} - ${d.jmeno} - LIS ${i+1}`;
    h.classList.add("blink");
    setTimeout(()=>h.classList.remove("blink"),1000);
}

function playTone(){
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.frequency.value=1000;
    o.connect(g);
    g.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime+0.3);
}

window.setupMode=function(){
    setupScreen.style.display="block";
    productionScreen.style.display="none";
    requestsScreen.style.display="none";
    document.querySelector(".topbarContainer").style.display = "flex";
}

window.productionMode=function(){
    setupScreen.style.display="none";
    productionScreen.style.display="block";
    requestsScreen.style.display="none";
    document.querySelector(".topbarContainer").style.display = "flex";
}

window.requestsMode=function(){
    setupScreen.style.display="none";
    productionScreen.style.display="none";
    requestsScreen.style.display="block";
    document.querySelector(".topbarContainer").style.display = "none";
}

window.addEventListener("load",()=>{
    if(window.location.search.includes("pozadavky")){
        requestsMode();
    }
});

</script>

</body>
</html>
