<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEMMSOFT 4.0</title>
<style>
body{font-family:Segoe UI,Arial;background:#0b1220;color:white;margin:0;padding:0;}
.topbarContainer{display:flex;align-items:center;justify-content:space-between;padding:15px;}
.topbar button{padding:10px 20px;margin:5px;background:#22c55e;border:none;border-radius:8px;font-size:16px;color:white;cursor:pointer;}
.kemmsTop{font-size:28px;color:#32c65e;font-weight:bold;}
.header{text-align:center;font-size:64px;font-weight:bold;padding:15px;background:#374151;margin:0;}
.layout{display:grid;grid-template-columns:4fr 1.4fr;gap:25px;padding:20px;}
.rowTop{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:20px;}
.rowBottom{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.card{background:#111827;padding:20px;border-radius:16px;text-align:center;transition:transform 0.3s,box-shadow 0.3s,background 1s;}
.card.active{box-shadow:0 0 30px #22c55e;transform:scale(1.05);background:#22c55e;}
.card.assigned{background:#22c55e33;}
.lis{font-size:28px;font-weight:bold;margin-bottom:6px;}
.kontakt{font-size:24px;color:#22d3ee;}
.prurez{font-size:24px;color:#fbbf24;}
.jmeno{font-size:24px;color:#a3e635;margin-top:4px;}
.time{font-size:16px;color:#ccc;margin-top:4px;}
.hotovo{margin-top:10px;padding:6px 12px;background:#ef4444;border:none;border-radius:6px;color:white;cursor:pointer;}
.queue{background:#020617;padding:15px;border-radius:16px;max-height:80vh;overflow-y:auto;}
.queueTitle{font-size:20px;margin-bottom:6px;}
.queueItem{padding:10px;border-bottom:1px solid #1e293b;margin-bottom:8px;}
.assign button{margin:2px;padding:4px 8px;background:#22c55e;border:none;border-radius:4px;color:white;cursor:pointer;font-size:12px;}
.assign .delete{background:#ef4444;}
input{width:100%;padding:6px;margin-bottom:6px;border-radius:6px;border:none;}
.addBtn{width:100%;padding:8px;background:#3b82f6;border:none;border-radius:6px;color:white;cursor:pointer;}
.screen{display:none;}
#fullscreenPopup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:bold;color:#22c55e;z-index:9999;text-align:center;display:none;}
.blink{animation:blinkAnim 1s infinite;}
@keyframes blinkAnim{0%{background:#22c55e}50%{background:#111827}100%{background:#22c55e}}
</style>
</head>
<body>

<div class="topbarContainer">
  <div class="kemmsTop">KEMMSOFT 4.0</div>
  <div class="topbar">
    <button onclick="showScreen('setup')">Nastavení</button>
    <button onclick="showScreen('production')">Výrobní obrazovka</button>
    <button onclick="showScreen('requests')">Požadavky</button>
  </div>
</div>

<div class="header" id="mainHeader">---</div>
<div id="fullscreenPopup"></div>

<!-- Nastavení -->
<div id="setup" class="screen">
<div class="layout">
<div>
<div class="rowTop" id="setupTop"></div>
<div class="rowBottom" id="setupBottom"></div>
</div>
<div class="queue">
<h3>Požadavky</h3>
<div id="setupQueue"></div>
<h4>Přidat nový požadavek</h4>
<input id="setupKontakt" placeholder="Číslo kontaktu">
<input id="setupPrurez" placeholder="Průřez">
<input id="setupJmeno" placeholder="Jméno">
<button class="addBtn" onclick="addRequestSetup()">Odeslat</button>
</div>
</div>
</div>

<!-- Výroba -->
<div id="production" class="screen">
<div class="layout">
<div>
<div class="rowTop" id="prodTop"></div>
<div class="rowBottom" id="prodBottom"></div>
</div>
<div class="queue">
<h3>Požadavky</h3>
<div id="prodQueue"></div>
</div>
</div>
</div>

<!-- Požadavky -->
<div id="requests" class="screen">
<div style="max-width:400px;margin:40px auto">
<h3>Zadání požadavku</h3>
<input id="kontakt" placeholder="Číslo kontaktu">
<input id="prurez" placeholder="Průřez">
<input id="jmeno" placeholder="Jméno">
<button class="addBtn" onclick="addRequest()">Odeslat</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAhiCfh-Di_NdPO5rGM7CZFQGaSymcdWxI",
authDomain:"lisyweb-df6d9.firebaseapp.com",
databaseURL:"https://lisyweb-df6d9-default-rtdb.firebaseio.com/",
projectId:"lisyweb-df6d9"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const LIS_COUNT=7;
let lisy=[]; let pozadavky=[];

function emptyLis(){ return {kontakt:"",prurez:"",jmeno:"",time:""} }
function timeNow(){ return new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}) }

onValue(ref(db,'lisy'),snap=>{
  const data=snap.val();
  lisy=data?Object.values(data):Array.from({length:LIS_COUNT},()=>emptyLis());
  while(lisy.length<LIS_COUNT) lisy.push(emptyLis());
  renderAll();
});

onValue(ref(db,'pozadavky'),snap=>{
  const data=snap.val();
  pozadavky=data?Object.entries(data).map(([k,v])=>({...v,key:k})): [];
  renderAll();
});

function renderAll(){
  renderLisy("setupTop","setupBottom",true);
  renderLisy("prodTop","prodBottom",false);
  renderQueue("setupQueue",true);
  renderQueue("prodQueue",false);
}

function renderLisy(topID,bottomID,setup){
  const top=document.getElementById(topID);
  const bottom=document.getElementById(bottomID);
  top.innerHTML=""; bottom.innerHTML="";
  for(let i=0;i<7;i++){
    const d=lisy[i]||emptyLis();
    const assigned=d.kontakt!=="";
    const html=`<div class="card ${assigned?'assigned':''}" id="lis${i}">
      <div class="lis">LIS ${i+1}</div>
      <div class="kontakt">${d.kontakt||"---"}</div>
      <div class="prurez">${d.prurez||"---"}</div>
      <div class="jmeno">${d.jmeno||"---"}</div>
      <div class="time">${d.time||""}</div>
      ${setup?`<button class="hotovo" onclick="clearLis(${i})">HOTOVO</button>`:""}
    </div>`;
    if(i<3) top.innerHTML+=html; else bottom.innerHTML+=html;
  }
}

function renderQueue(id,setup){
  const q=document.getElementById(id);
  q.innerHTML="";
  pozadavky.forEach((p,i)=>{
    q.innerHTML+=`<div class="queueItem">
      <b>${p.kontakt}</b> - ${p.prurez} - ${p.jmeno}
      <div class="time">${p.time||""}</div>
      ${setup?`<div class="assign">
        ${[0,1,2,3,4,5,6].map(l=>`<button onclick="assign(${l},${i})">L${l+1}</button>`).join('')}
        <button class="delete" onclick="deleteReq('${p.key}')">X</button>
      </div>`:""}
    </div>`;
  });
}

window.assign=function(lisIndex,reqIndex){
  const p=pozadavky[reqIndex];
  set(ref(db,`lisy/${lisIndex}`),{kontakt:p.kontakt,prurez:p.prurez,jmeno:p.jmeno,time:timeNow()});
  remove(ref(db,'pozadavky/'+p.key));
  blink(p,lisIndex);
}

window.clearLis=function(i){ set(ref(db,`lisy/${i}`),emptyLis()); }
window.deleteReq=function(key){ remove(ref(db,'pozadavky/'+key)); }
window.addRequest=function(){
  const kontakt=document.getElementById("kontakt").value;
  const prurez=document.getElementById("prurez").value;
  const jmeno=document.getElementById("jmeno").value;
  const r=push(ref(db,'pozadavky'));
  set(r,{kontakt,prurez,jmeno,time:timeNow()});
  document.getElementById("kontakt").value="";
  document.getElementById("prurez").value="";
  document.getElementById("jmeno").value="";
}
window.addRequestSetup=function(){
  const kontakt=document.getElementById("setupKontakt").value;
  const prurez=document.getElementById("setupPrurez").value;
  const jmeno=document.getElementById("setupJmeno").value;
  const r=push(ref(db,'pozadavky'));
  set(r,{kontakt,prurez,jmeno,time:timeNow()});
  document.getElementById("setupKontakt").value="";
  document.getElementById("setupPrurez").value="";
  document.getElementById("setupJmeno").value="";
}

function blink(p,i){
  const card=document.getElementById("lis"+i);
  const header=document.getElementById("mainHeader");
  if(card) card.classList.add("active");
  header.innerText=`${p.kontakt} - ${p.prurez} - ${p.jmeno} → LIS ${i+1}`;
  header.classList.add("blink");
  setTimeout(()=>{ if(card) card.classList.remove("active"); header.classList.remove("blink"); },3000);
  showFullscreenPopup(header.innerText);
  playTone();
}

function showFullscreenPopup(text){
  const popup=document.getElementById("fullscreenPopup");
  popup.innerText=text;
  popup.style.display="flex";
  setTimeout(()=>popup.style.display="none",5000);
}

function playTone(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.frequency.value=1000;
  o.connect(g);
  g.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.3);
}

window.showScreen=function(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

showScreen("setup");
</script>
</body>
</html>
