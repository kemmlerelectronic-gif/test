<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>KEMMSOFT 4.0 Testing</title>
<style>
body{
font-family:Segoe UI,Arial;
background:url("background.png") center/cover fixed;
margin:0;
color:white;
}
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
z-index:-1;
}
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
}
.logo {
    font-size: 36px;
    font-weight: bold;
    background: linear-gradient(45deg, #22c55e); 
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
}
.nav button{
padding:8px 16px;
margin-left:6px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}
.header{
text-align:center;
font-size:68px;
background:#111827cc;
padding:10px;
transition: all 0.3s ease;
}
@keyframes headerBlink {
  0%, 100% { color: #22c55e; }
  50% { color: #ffffff; }
}
.header.blink {
  animation: headerBlink 1s infinite;
}
.layout{
display:grid;
grid-template-columns:4fr 1.3fr;
gap:20px;
padding:20px;
}
.rowTop{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:20px;
}
.rowBottom{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}
.card{
background:#020617dd;
padding:25px;
border-radius:18px;
text-align:center;
transition:.3s;
position: relative; /* Pro správné zobrazení animačního elementu */
}
.card.assigned{
background:#22c55e90;
color:black;
box-shadow:0 0 20px #22c55e44;
}
.card.active{
background:#22c55e;
color:black;
box-shadow:0 0 40px #22c55e;
transform:scale(1.05);
}
.lis {
    font-size: 26px;
    font-weight: bold;
    background: linear-gradient(45deg, #22c55e); 
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
        2px 2px 4px rgba(0,0,0,0.5),
        4px 4px 6px rgba(0,0,0,0.4);
    transition: all 0.3s ease;
}
.card:hover .lis {
    transform: scale(1.1) rotateX(2deg) rotateY(2deg);
    text-shadow:
        3px 3px 5px rgba(0,0,0,0.6),
        6px 6px 8px rgba(0,0,0,0.5);
}
@keyframes lisBlink {
    0% { transform: scale(1) rotateX(0deg) rotateY(0deg); text-shadow: 2px 2px 4px rgba(0,0,0,0.5), 4px 4px 6px rgba(0,0,0,0.4); }
    50% { transform: scale(1.2) rotateX(5deg) rotateY(5deg); text-shadow: 4px 4px 8px rgba(0,0,0,0.7), 8px 8px 10px rgba(0,0,0,0.6); }
    100% { transform: scale(1) rotateX(0deg) rotateY(0deg); text-shadow: 2px 2px 4px rgba(0,0,0,0.5), 4px 4px 6px rgba(0,0,0,0.4); }
}
.card.active .lis {
    animation: lisBlink 1.2s ease forwards;
}
.kontakt{font-size:22px;color:#22d3ee}
.prurez{font-size:20px;color:#fbbf24}
.jmeno{font-size:18px;color:#a3e635}
.time{font-size:16px;color:#cbd5f5;margin-top:4px}
.hotovo{
margin-top:10px;
padding:6px 14px;
border:none;
border-radius:6px;
background:#ef4444;
color:white;
cursor:pointer;
}
.queue{
background:#020617dd;
padding:20px;
border-radius:18px;
max-height:80vh;
overflow-y:auto;
}
.queueItem{
padding:10px;
border-bottom:1px solid #1e293b;
margin-bottom:8px;
position: relative; /* Pro správné zobrazení animačního elementu */
}
.assign button{
margin:2px;
padding:4px 8px;
border:none;
border-radius:4px;
background:#22c55e;
color:white;
cursor:pointer;
}
.assign .delete{
background:#ef4444;
}
input{
width:100%;
padding:8px;
margin-bottom:6px;
border-radius:6px;
border:none;
}
.addBtn{
width:100%;
padding:10px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:flex;
align-items:center;
justify-content:center;
font-size:90px;
font-weight:bold;
color:#22c55e;
z-index:100;
text-align:center;
padding:40px;
display:none;
}
.fullscreenPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:flex;
align-items:center;
justify-content:center;
font-size:80px;
font-weight:bold;
color:#22c55e;
z-index:200;
text-align:center;
padding:40px;
display:none;
}
.screen{display:none}

/* Styl pro animovaný "létající" prvek */
.flying-request {
    position: fixed;
    z-index: 9999;
    background: linear-gradient(45deg, #22c55e, #fbbf24); /* Barva požadavku */
    color: white;
    padding: 10px 15px;
    border-radius: 10px;
    font-size: 1.2em;
    font-weight: bold;
    white-space: nowrap;
    transition: transform 0.8s ease-in-out, opacity 0.8s ease-in-out; /* Animace transformace a průhlednosti */
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    opacity: 1;
    display: flex; /* Aby text byl centrovaný */
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* Specific styling for fullscreen animation */
.flying-request-fullscreen {
    transition: all 0.8s ease-in-out; /* Pro celou obrazovku */
    font-size: 80px; /* Větší text */
    padding: 40px;
    border-radius: 20px;
    width: 100vw;
    height: 100vh;
    left: 0;
    top: 0;
    opacity: 0; /* Začíná schovaná */
    transform: scale(0.1); /* Zmenšená */
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">KEMMSOFT 4.0 Testing</div>
<div class="nav">
<button onclick="showScreen('setup')">Nastavení</button>
<button onclick="showScreen('production')">Výrobní obrazovka</button>
<button onclick="showScreen('requests')">Požadavky</button>
</div>
</div>

<div class="header" id="mainHeader">---</div>
<div class="popup" id="popup"></div>
<div class="fullscreenPopup" id="fullscreenPopup"></div>

<!-- NASTAVENI -->
<div id="setup" class="screen">
<div class="layout">
<div>
<div class="rowTop" id="setupTop"></div>
<div class="rowBottom" id="setupBottom"></div>
</div>
<div class="queue">
<h3>Požadavky</h3>
<div id="setupQueue"></div>
<h3>Nový požadavek</h3>
<input id="setupKontakt" placeholder="Číslo kontaktu">
<input id="setupPrurez" placeholder="Průřez">
<input id="setupJmeno" placeholder="Jméno">
<button class="addBtn" onclick="addRequestSetup()">Odeslat</button>
</div>
</div>
</div>

<!-- VYROBA -->
<div id="production" class="screen">
<div class="layout">
<div>
<div class="rowTop" id="prodTop"></div>
<div class="rowBottom" id="prodBottom"></div>
</div>
<div class="queue">
<h3>Požadavky</h3>
<div id="prodQueue"></div>
</div>
</div>
</div>

<!-- POZADAVKY -->
<div id="requests" class="screen">
<div style="max-width:400px;margin:40px auto">
<h2>Nový požadavek</h2>
<input id="kontakt" placeholder="Číslo kontaktu">
<input id="prurez" placeholder="Průřez">
<input id="jmeno" placeholder="Jméno">
<button class="addBtn" onclick="addRequest()">Odeslat</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAhiCfh-Di_NdPO5rGM7CZFQGaSymcdWxI",
authDomain:"lisyweb-df6d9.firebaseapp.com",
databaseURL:"https://lisyweb-df6d9-default-rtdb.firebaseio.com/",
projectId:"lisyweb-df6d9"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const LIS_COUNT=7;
let lisy=[];
let pozadavky=[];
let lastLisy = []; // Nová proměnná pro ukládání předchozího stavu lisy

function emptyLis(){ return {kontakt:"",prurez:"",jmeno:"",time:""} }
function timeNow(){ return new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}) }

onValue(ref(db,'lisy'),snap=>{
  const data=snap.val();
  const currentLisy = data ? Object.values(data) : Array.from({length:LIS_COUNT},()=>emptyLis());
  
  currentLisy.forEach(async (lis, i) => { // Použijeme async pro await v animaci
    const oldLis = lastLisy[i];
    const currentScreen = document.querySelector(".screen:not([style*='display: none'])")?.id;

    // Detekce nového přiřazení (pokud lis.kontakt existuje a buď dříve neexistoval, nebo se změnil)
    if (lis.kontakt && (!oldLis || oldLis.kontakt !== lis.kontakt)) {
      blink(lis, i, true); 
    }

    // Spuštění "létající" animace na pasivních zařízeních
    if (lis.assignedAnimation && lis.assignedAnimation.targetLisIndex === i) {
        const targetElement = document.getElementById(`lis${i}`);
        if (targetElement) {
            if (currentScreen === "production") { // Speciální animace pro Výrobní obrazovku
                await animateFlyingRequestFullscreen(targetElement, lis.assignedAnimation.requestDetails);
            } else { // Standardní animace pro ostatní obrazovky (setup, requests)
                await animateFlyingRequestFromCenter(targetElement, lis.assignedAnimation.requestDetails);
            }
            // Po dokončení animace odstraníme data pro animaci z Firebase
            // Použijeme update s null, aby se odstranil pouze assignedAnimation property
            update(ref(db, `lisy/${i}`), { assignedAnimation: null });
        }
    }
  });

  lisy = currentLisy;
  while(lisy.length<LIS_COUNT) lisy.push(emptyLis());
  
  lastLisy = JSON.parse(JSON.stringify(lisy)); // Aktualizujeme lastLisy pro další porovnání

  renderAll();
  updateHeader();
});

onValue(ref(db,'pozadavky'),snap=>{
  const data=snap.val();
  pozadavky = data ? Object.entries(data).map(([k,v])=>({...v,key:k})) : [];
  renderAll();
});

function renderAll(){
  renderLisy("setupTop","setupBottom",true);
  renderLisy("prodTop","prodBottom",false);
  renderQueue("setupQueue",true);
  renderQueue("prodQueue",false);
}

function renderLisy(topID,bottomID,setup){
  const top=document.getElementById(topID);
  const bottom=document.getElementById(bottomID);
  top.innerHTML=""; bottom.innerHTML="";
  for(let i=0;i<7;i++){
    const d = lisy[i] || emptyLis();
    const assigned = d.kontakt!=="";
    const html = `
      <div class="card ${assigned?'assigned':''}" id="lis${i}">
        <div class="lis">LIS ${i+1}</div>
        <div class="kontakt">${d.kontakt||"---"}</div>
        <div class="prurez">${d.prurez||"---"}</div>
        <div class="jmeno">${d.jmeno||"---"}</div>
        <div class="time">${d.time||""}</div>
        ${setup?`<button class="hotovo" onclick="clearLis(${i})">HOTOVO</button>`:""}
      </div>
    `;
    if(i<3) top.innerHTML += html;
    else bottom.innerHTML += html;
  }
}

function renderQueue(id,setup){
  const q=document.getElementById(id);
  q.innerHTML="";
  pozadavky.forEach((p,i)=>{
    q.innerHTML+=`
      <div class="queueItem" id="request-${p.key}">
        <b>${p.kontakt}</b> - ${p.prurez} - ${p.jmeno}
        <div class="time">${p.time}</div>
        ${setup?`
        <div class="assign">
          ${[0,1,2,3,4,5,6].map(l=>`<button onclick="assign(${l},${i})">L${l+1}</button>`).join('')}
          <button class="delete" onclick="deleteReq('${p.key}')">X</button>
        </div>`:""}
      </div>`;
  });
}

window.assign=async function(lisIndex,reqIndex){
  const p=pozadavky[reqIndex];
  if (!p) return;

  const currentScreen = document.querySelector(".screen:not([style*='display: none'])")?.id;
  const targetElement = document.getElementById(`lis${lisIndex}`);

  // Animace pro aktuální zařízení, kde dochází k přiřazení
  // Zde zohledňujeme, jestli je aktivní production obrazovka
  if (currentScreen === "production" && targetElement) {
      // Pokud jsme na production obrazovce a přiřazujeme, animujeme přímo fullscreen
      await animateFlyingRequestFullscreen(targetElement, p);
  } else {
      // Jinak, pokud je sourceElement dostupný, animujeme z něj (pro setup/requests)
      const sourceElement = document.getElementById(`request-${p.key}`);
      if (sourceElement && targetElement) {
          await animateFlyingRequest(sourceElement, targetElement, p);
      } else if (targetElement) { // Fallback pro případ, že zdrojový element není k dispozici (např. stránka nebyla reloadnuta)
          await animateFlyingRequestFromCenter(targetElement, p);
      }
  }

  // Aktualizujeme Firebase pro lis
  set(ref(db,`lisy/${lisIndex}`),{
    kontakt:p.kontakt,
    prurez:p.prurez,
    jmeno:p.jmeno,
    time:timeNow(),
    assignedAnimation: { // Nový objekt pro data animace
      targetLisIndex: lisIndex,
      requestDetails: { kontakt: p.kontakt, prurez: p.prurez, jmeno: p.jmeno }
    }
  });
  
  // Odstraníme požadavek z fronty
  remove(ref(db,'pozadavky/'+p.key));
}

window.clearLis=function(i){
  set(ref(db,`lisy/${i}`),emptyLis());
}

window.deleteReq=function(key){ remove(ref(db,'pozadavky/'+key)); }

window.addRequest=function(){
  const kontakt=document.getElementById("kontakt").value;
  const prurez=document.getElementById("prurez").value;
  const jmeno=document.getElementById("jmeno").value;
  const r=push(ref(db,'pozadavky'));
  set(r,{kontakt,prurez,jmeno,time:timeNow()});
  document.getElementById("kontakt").value="";
  document.getElementById("prurez").value="";
  document.getElementById("jmeno").value="";
}

window.addRequestSetup=function(){
  const kontakt=document.getElementById("setupKontakt").value;
  const prurez=document.getElementById("setupPrurez").value;
  const jmeno=document.getElementById("setupJmeno").value;
  const r=push(ref(db,'pozadavky'));
  set(r,{kontakt,prurez,jmeno,time:timeNow()});
  document.getElementById("setupKontakt").value="";
  document.getElementById("setupPrurez").value="";
  document.getElementById("setupJmeno").value="";
}

function blink(p,i,assigned=false){
  const card=document.getElementById("lis"+i);
  if(card){
    card.classList.add("active");
    if(assigned) card.classList.add("assigned");
    setTimeout(()=>{
        card?.classList.remove("active");
        if(assigned) card?.classList.add("assigned");
    },1200);
  }

  const header=document.getElementById("mainHeader");
  header.innerText=`${p.kontakt} - ${p.prurez} - ${p.jmeno} → LIS ${i+1}`;
  header.classList.add("blink");
  setTimeout(()=>header.classList.remove("blink"),3000);

  const currentScreen=document.querySelector(".screen:not([style*='display: none'])")?.id;
  if(currentScreen==="production"){ 
    showFullscreenPopup(`${p.kontakt} - ${p.prurez} - ${p.jmeno} → LIS ${i+1}`);
  }

  tone();
}

// Původní animace z fronty na lis (pro zařízení, kde došlo k akci assign a není to production)
function animateFlyingRequest(sourceEl, targetEl, requestData) {
    return new Promise(resolve => {
        const flyingEl = document.createElement('div');
        flyingEl.className = 'flying-request';
        flyingEl.innerText = `${requestData.kontakt} - ${requestData.prurez} - ${requestData.jmeno}`;
        document.body.appendChild(flyingEl);

        const sourceRect = sourceEl.getBoundingClientRect();
        const targetRect = targetEl.getBoundingClientRect();

        flyingEl.style.left = `${sourceRect.left}px`;
        flyingEl.style.top = `${sourceRect.top}px`;
        flyingEl.style.width = `${sourceRect.width}px`; 
        flyingEl.style.height = `${sourceRect.height}px`; 
        
        flyingEl.style.transform = `translate(0, 0) scale(1)`; 
        flyingEl.style.opacity = '1';

        const targetX = targetRect.left + (targetRect.width / 2) - (sourceRect.width / 2);
        const targetY = targetRect.top + (targetRect.height / 2) - (sourceRect.height / 2);

        requestAnimationFrame(() => {
            flyingEl.style.transform = `translate(${targetX - sourceRect.left}px, ${targetY - sourceRect.top}px) scale(0.5)`;
            flyingEl.style.opacity = '0';
        });

        flyingEl.addEventListener('transitionend', () => {
            flyingEl.remove();
            resolve();
        }, { once: true });
    });
}

// Animace z centrální pozice na lis (pro pasivní zařízení, pokud není production)
function animateFlyingRequestFromCenter(targetEl, requestDetails) {
    return new Promise(resolve => {
        const flyingEl = document.createElement('div');
        flyingEl.className = 'flying-request';
        flyingEl.innerText = `${requestDetails.kontakt} - ${requestDetails.prurez} - ${requestDetails.jmeno}`;
        document.body.appendChild(flyingEl);

        const targetRect = targetEl.getBoundingClientRect();

        const startX = window.innerWidth / 2 - (flyingEl.offsetWidth / 2);
        const startY = window.innerHeight / 2 - (flyingEl.offsetHeight / 2);

        flyingEl.style.left = `${startX}px`;
        flyingEl.style.top = `${startY}px`;

        flyingEl.style.transform = `scale(0)`; 
        flyingEl.style.opacity = '0';

        requestAnimationFrame(() => {
            flyingEl.style.transform = `scale(1)`;
            flyingEl.style.opacity = '1';
            
            setTimeout(() => { 
                const targetX = targetRect.left + (targetRect.width / 2) - (flyingEl.offsetWidth / 2);
                const targetY = targetRect.top + (targetRect.height / 2) - (flyingEl.offsetHeight / 2);
                
                flyingEl.style.transition = 'transform 0.8s ease-in-out, opacity 0.8s ease-in-out';
                flyingEl.style.transform = `translate(${targetX - startX}px, ${targetY - startY}px) scale(0.5)`;
                flyingEl.style.opacity = '0';
            }, 500); 
        });

        flyingEl.addEventListener('transitionend', () => {
            flyingEl.remove();
            resolve();
        }, { once: true });
    });
}

// NOVÁ ANIMACE: Letí z fullscreen na lis a "sroluje se"
function animateFlyingRequestFullscreen(targetEl, requestDetails) {
    return new Promise(resolve => {
        const flyingEl = document.createElement('div');
        flyingEl.className = 'flying-request flying-request-fullscreen';
        flyingEl.innerText = `${requestDetails.kontakt} - ${requestDetails.prurez} - ${requestDetails.jmeno}`;
        document.body.appendChild(flyingEl);

        const targetRect = targetEl.getBoundingClientRect();

        // Fáze 1: Objeví se a zvětší na fullscreen
        requestAnimationFrame(() => {
            flyingEl.style.opacity = '1';
            flyingEl.style.transform = 'scale(1)'; 
        });

        // Fáze 2 & 3: Zůstane chvíli fullscreen, pak se přesune a sroluje do lisu
        setTimeout(() => {
            // Cílové rozměry a pozice pro "srolování"
            const finalX = targetRect.left;
            const finalY = targetRect.top;
            const finalWidth = targetRect.width;
            const finalHeight = targetRect.height;
            const finalFontSize = parseFloat(getComputedStyle(targetEl.querySelector('.kontakt')).fontSize);
            const finalBorderRadius = parseFloat(getComputedStyle(targetEl).borderRadius);
            const finalBackground = getComputedStyle(targetEl).backgroundColor;

            // Změníme transition, aby animoval více vlastností
            flyingEl.style.transition = 'all 0.8s ease-in-out';
            
            // Nastavíme cílové styly pro transformaci
            flyingEl.style.left = `${finalX}px`;
            flyingEl.style.top = `${finalY}px`;
            flyingEl.style.width = `${finalWidth}px`;
            flyingEl.style.height = `${finalHeight}px`;
            flyingEl.style.fontSize = `${finalFontSize}px`;
            flyingEl.style.borderRadius = `${finalBorderRadius}px`;
            flyingEl.style.background = finalBackground; /* Přechod na barvu lisu */
            flyingEl.style.opacity = '0'; /* Pomalu mizí */
            flyingEl.style.transform = 'scale(0.8)'; /* Zmenší se k velikosti lisu */
            flyingEl.innerText = ''; // Vymažeme text, jakmile se sroluje
            
        }, 1500); // Zobrazí fullscreen na 1.5 sekundy

        flyingEl.addEventListener('transitionend', () => {
            flyingEl.remove();
            resolve();
        }, { once: true });
    });
}

function showFullscreenPopup(text){
  const popup=document.getElementById("fullscreenPopup");
  popup.innerText=text;
  popup.style.display="flex";
  setTimeout(()=>popup.style.display="none",5000);
}

function updateHeader(){
  const prodScreen=document.getElementById("production");
  if(prodScreen.style.display !== "block") return;
  let last = null;
  lisy.forEach((l,i)=>{
    if(l.kontakt !== "") last = `${l.kontakt} - ${l.prurez} - ${l.jmeno} → LIS ${i+1}`;
  });
  document.getElementById("mainHeader").innerText = last || "---";
}

function popup(text){
  const p=document.getElementById("popup");
  p.innerText=text;
  p.style.display="flex";
  setTimeout(()=>p.style.display="none",5000);
}

function tone(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  o.frequency.value=900;
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.25);
}

window.showScreen=function(id){
    document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
    document.getElementById(id).style.display="block";
    updateHeader();
}

showScreen("setup");
setInterval(()=>{
  const production = document.getElementById("production");
  if(production.style.display !== "block") return;
  const q = production.querySelector(".queue");
  if(!q) return;
  q.scrollTop += 1;
  if(q.scrollTop + q.clientHeight >= q.scrollHeight) q.scrollTop = 0;
},100);

</script>
</body>
</html>
