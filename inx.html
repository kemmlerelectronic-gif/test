<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEMMSOFT 4.5 Testing</title>

<style>
/* Základní styly */
body{
font-family: 'Segoe UI', Arial, sans-serif; /* Moderní bezpatkový font */
background:url("background.png") center/cover fixed; /* Předpokládá se existující background.png */
margin:0;
color:white;
overflow-x: hidden; /* Zamezí horizontálnímu scrollu kvůli animacím */
}
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
z-index:-1;
}
.topbarContainer{ /* Název z tvého nového kódu */
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 25px;
background: rgba(0, 0, 0, 0.6); /* Lehce průhledné pozadí pro topbar */
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
transition: all 0.3s ease; /* Pro animaci skrytí/zobrazení */
}
/* ----- OPRAVENÁ TŘÍDA PRO SKRYTÍ TOPBARU ----- */
.topbarContainer.hidden { /* Název z tvého nového kódu */
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none; /* Zakáže interakci s neviditelným topbarem */
}

/* VYLEPŠENÝ TEXT LOGA */
.kemmsTop { /* Název z tvého nového kódu */
    font-size: 38px; /* Trochu větší */
    font-weight: 900; /* Extra bold */
    background: linear-gradient(45deg, #22c55e, #34d399); /* Původní zelená pro logo */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 15px rgba(34, 197, 94, 0.8), 0 0 25px rgba(52, 211, 153, 0.6); /* Zářivý neonový stín */
    letter-spacing: 1px; /* Jemné rozestupy */
    transition: all 0.3s ease;
    animation: logoPulse 4s infinite alternate ease-in-out;
}
/* Keyframes pro pulzování loga */
@keyframes logoPulse {
    0% {
        background: linear-gradient(45deg, #22c55e, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 15px rgba(34, 197, 94, 0.8), 0 0 25px rgba(52, 211, 153, 0.6);
    }
    50% {
        background: linear-gradient(45deg, #166534, #1a9a4e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 8px rgba(22, 101, 52, 0.7);
    }
    100% {
        background: linear-gradient(45deg, #22c55e, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 15px rgba(34, 197, 94, 0.8), 0 0 25px rgba(52, 211, 153, 0.6);
    }
}

/* Styl pro hodiny - ZVĚTŠENÝ */
.realtime-clock {
    font-size: 4.2em; /* Původně 1.8em, nyní zvětšeno */
    font-weight: bold;
    color: #cbd5f5; /* Světlejší barva */
    margin-left: auto; /* Posune hodiny doprostřed mezi logo a tlačítka */
    margin-right: 20px; /* Mezera před tlačítky */
    text-shadow: 0 0 8px rgba(121, 187, 255, 0.5); /* Jemný svítící efekt */
}

/* MESSAGE BOARD - NOVÉ A VYLEPŠENÉ */
.message-board-container {
    flex-grow: 1; /* Zabere co nejvíce místa */
    margin: 0 20px; /* Mezera od hodin a tlačítek */
    height: 40px; /* Pevná výška */
    overflow: hidden; /* Skryje texty, které se nevejdou */
    position: relative;
    background: rgba(0, 0, 0, 0.3); /* Lehce tmavší pozadí */
    border-radius: 8px;
    display: flex; /* Centruje vzkazy vertikálně */
    align-items: center;
    padding: 0 15px;
    box-shadow: inset 0 0 8px rgba(34, 197, 94, 0.2); /* Jemný vnitřní stín */
    transition: all 0.3s ease;
}

/* Animace blikání kontejneru při novém vzkazu */
@keyframes boardFlash {
    0% { background: rgba(0, 0, 0, 0.3); box-shadow: inset 0 0 8px rgba(34, 197, 94, 0.2); }
    50% { background: rgba(255, 165, 0, 0.2); box-shadow: inset 0 0 20px rgba(255, 165, 0, 0.8), 0 0 10px rgba(255, 165, 0, 0.6); } /* Oranžové blikání */
    100% { background: rgba(0, 0, 0, 0.3); box-shadow: inset 0 0 8px rgba(34, 197, 94, 0.2); }
}
.message-board-container.flash {
    animation: boardFlash 1.5s ease-out;
}

.message-board {
    position: relative; /* Změna na relative */
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center; /* Centruje text vertikálně */
    overflow: hidden; /* Skryje přetékající text */
}

.message-item-wrapper { /* Nový wrapper pro plynulé rolování */
    display: inline-block; /* Aby se vešel do řádku */
    white-space: nowrap; /* Zabrání zalamování textu */
    position: absolute; /* Umožní animaci zprava doleva */
    animation: marquee-effect linear infinite; /* Aplikuje animaci rolování */
    animation-duration: var(--marquee-duration); /* Dynamicky nastavená délka animace */
    left: 100%; /* Startuje vpravo */
    transform: translateX(0); /* Zajištění výchozí pozice */
}

.message-item {
    font-size: 30px; /* Zvětšeno, jeden stupeň menší než KEMMSOFT (38px -> ~30px) */
    font-weight: 500;
    color: #e0ffe0; /* Světle zelený text */
    padding: 0; /* Padding je na wrapperu */
    line-height: 1.2; /* Mezera mezi řádky */
}

/* Keyframes pro marquee animaci */
@keyframes marquee-effect {
    0% { transform: translateX(0%); } /* Začíná na 0% šířky wrapperu */
    100% { transform: translateX(var(--scroll-target)); } /* Roluje až na target */
}

/* Blikání NOVÉHO vzkazu (oranžové a neustálé) */
@keyframes messageItemBlink {
    0%, 100% { color: #FFECB3; text-shadow: 0 0 5px rgba(255, 236, 179, 0.7); } /* Světle oranžová */
    50% { color: #FFA500; text-shadow: 0 0 10px rgba(255, 165, 0, 0.9); } /* Plná oranžová */
}
.message-item.urgent-message-blink {
    /* Blink animace je teď na message-item, aby rolování nebylo ovlivněno */
    animation: messageItemBlink 2s infinite alternate ease-in-out; 
}

/* VYLEPŠENÁ NAVIGAČNÍ TLAČÍTKA */
.topbar button{ /* Název z tvého nového kódu */
padding:12px 22px; /* Větší padding */
margin-left:10px; /* Větší mezera */
border:none;
border-radius:8px; /* Více zaoblené */
background: linear-gradient(135deg, #22c55e, #1a9a4e); /* Gradient */
color:white;
cursor:pointer;
font-size: 1.1em; /* Větší text */
font-weight: 600; /* Bold */
box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); /* 3D stín */
transition: all 0.3s ease; /* Plynulý přechod */
position: relative;
overflow: hidden; /* Pro efekty */
}
.topbar button::before { /* Jemná světelná záře */
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.1);
    transform: skewX(-30deg);
    transition: all 0.5s ease;
}
.topbar button:hover::before {
    left: 100%;
}
.topbar button:hover {
    background: linear-gradient(135deg, #1a9a4e, #22c55e); /* Otočený gradient při hoveru */
    transform: translateY(-3px) scale(1.02); /* Mírné zvednutí a zvětšení */
    box-shadow: 0 8px 25px rgba(34, 197, 94, 0.6); /* Výraznější stín */
}
/* Aktivní tlačítko */
.topbar button.active-nav {
    background: linear-gradient(135deg, #0f4f2c, #166534); /* Tmavší zelená pro aktivní */
    box-shadow: 0 2px 10px rgba(34, 197, 94, 0.8), inset 0 0 8px rgba(34, 197, 94, 0.6);
    transform: translateY(0);
    border: 1px solid #22c55e;
}

.header{
text-align:center;
font-size:68px; /* Pro TV */
background:#111827cc;
padding:10px;
transition: all 0.3s ease;
text-shadow: 2px 2px 8px rgba(0,0,0,0.7); /* Vylepšený stín */
border-bottom: 2px solid rgba(34, 197, 94, 0.5); /* Moderní linka */
min-height: 100px; /* Zajistí, že hlavička má vždy výšku */
display: flex; /* Pro centrování textu vertikálně */
align-items: center;
justify-content: center;
}
@keyframes headerBlink {
  0%, 100% { color: #22c55e; text-shadow: 0 0 15px #22c55e; }
  50% { color: #ffffff; text-shadow: none; }
}
.header.blink { animation: headerBlink 1s infinite; } /* Název z tvého nového kódu */

.layout{
display:grid;
grid-template-columns:4fr 1.3fr;
gap:20px;
padding:20px;
}
.rowTop{ display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:20px; }
.rowBottom{ display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }

/* KARTY LISŮ - VIZUÁLNÍ TUNING PRO VÝROBNÍ OBRAZOVKU */
.card{
background: linear-gradient(145deg, #020617ee, #111827ee); /* Dynamický tmavý gradient */
padding:25px;
border-radius:22px; /* Více zaoblené rohy */
text-align:center;
transition: all .4s ease-out; /* Dlouhý a plynulý transition pro všechny stavy */
position: relative;
box-shadow: 0 8px 20px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.05); /* Hluboký vnější a jemný vnitřní stín */
border: 1px solid rgba(34, 197, 94, 0.15); /* Jemný okraj */
}

/* Stav PŘIŘAZENO (ASSIGNED) */
.card.assigned{
background: linear-gradient(145deg, #16653499, #1a9a4e99); /* Zelenější, ale stále průhledný gradient */
color: #e0ffe0; /* Světle zelený text, aby vynikl */
box-shadow: 0 0 30px rgba(34, 197, 94, 0.7), inset 0 0 15px rgba(34, 197, 94, 0.5); /* Zářivější zelený stín */
border-color: #22c55e;
animation: pulseBorder 2s infinite ease-in-out; /* Nová pulzující animace okraje */
}
/* Keyframes pro jemné pulzování okraje pro obsazené LISy */
@keyframes pulseBorder {
    0% { border-color: rgba(34, 197, 94, 0.5); box-shadow: 0 0 15px rgba(34, 197, 94, 0.4), inset 0 0 8px rgba(34, 197, 94, 0.3); }
    50% { border-color: rgba(34, 197, 94, 0.8); box-shadow: 0 0 25px rgba(34, 197, 94, 0.7), inset 0 0 12px rgba(34, 197, 94, 0.5); }
    100% { border-color: rgba(34, 197, 94, 0.5); box-shadow: 0 0 15px rgba(34, 197, 94, 0.4), inset 0 0 8px rgba(34, 197, 94, 0.3); }
}

/* Stav AKTIVNÍ (ACTIVE) - při novém přiřazení */
.card.active{ 
background: linear-gradient(145deg, #22c55e, #1a9a4e); /* Plný, jasný zelený gradient */
color: #000; /* Text černej, maximální kontrast */
box-shadow: 0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.6); /* Super zářivá, bílý okraj */
transform: scale(1.08); /* Trochu větší zvětšení */
border-color: #22c55e;
animation: cardActiveScale 1.2s forwards; /* Vlastní animace pro active stav */
}
@keyframes cardActiveScale {
    0% { transform: scale(1); box-shadow: 0 8px 20px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.05); }
    50% { transform: scale(1.1); box-shadow: 0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.6); }
    100% { transform: scale(1.08); box-shadow: 0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.6); }
}

/* LIS text - VYLEPŠENÝ STYL */
.lis {
    font-size: 40px; /* Ještě větší text LIS */
    font-weight: 900; /* Extra bold */
    background: linear-gradient(45deg, #6ee7b7, #34d399); /* Jasnější zelený gradient */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
        6px 6px 12px rgba(0,0,0,0.8), /* Výraznější, hlubší stín */
        8px 8px 16px rgba(0,0,0,0.7);
    transition: all 0.3s ease;
    margin-bottom: 25px; /* Více místa */
}
/* Animace textu LIS při aktivním stavu */
@keyframes lisTextBlink {
    0%, 100% { transform: scale(1); opacity: 1; text-shadow: 6px 6px 12px rgba(0,0,0,0.8); }
    50% { transform: scale(1.1); opacity: 0.9; text-shadow: 8px 8px 16px rgba(0,0,0,0.9); }
    100% { transform: scale(1); opacity: 1; text-shadow: 6px 6px 12px rgba(0,0,0,0.8); } /* Zpět na původní */
}
.card.active .lis {
    animation: lisTextBlink 1.2s ease forwards;
}

/* Styly pro data na kartě - JEŠTĚ VĚTŠÍ PRO TV */
.card .kontakt{font-size:38px;color:#22d3ee; margin-top: 30px; font-weight: 800;} /* Ještě větší */
.card .prurez{font-size:34px;color:#fbbf24; margin-top: 25px; font-weight: 700;} /* Ještě větší */
.card .jmeno{font-size:32px;color:#a3e635; margin-top: 25px; font-weight: 700;} /* Ještě větší */
.card .time{font-size:24px;color:#cbd5f5;margin-top:20px; font-weight: 500;} /* Větší */

.hotovo{ /* Tlačítko HOTOVO - jen pro nastavení, tam myš je */
margin-top:15px;
padding:8px 18px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer;
box-shadow: 0 4px 8px rgba(239, 68, 68, 0.4);
transition: all 0.3s ease;
}
.hotovo:hover {
    background: #dc2626;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(239, 68, 68, 0.6);
}

/* FRONTĚ A JEJÍ POLOŽKY - VYLEPŠENÍ A PULZOVÁNÍ PŘI PŘÍCHODU */
.queue{
background: linear-gradient(145deg, #020617ee, #111827ee); /* Stejný gradient jako karty */
padding:20px;
border-radius:22px;
max-height:80vh;
overflow-y:auto;
box-shadow: 0 8px 20px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.05);
border: 1px solid rgba(34, 197, 94, 0.15);
}
/* Upravený queueTitle pro zobrazení počtu */
.queueTitle { 
    color: #22c55e;
    text-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
    margin-bottom: 15px;
    font-size: 1.8em; /* Větší nadpis fronty */
    display: flex; /* Pro zarovnání textu a čísla */
    justify-content: space-between; /* Rozprostření nadpisu a počtu */
    align-items: center;
}
.queueTitle .count {
    background-color: #22c55e; /* Zelené pozadí pro číslo */
    color: black; /* Černý text */
    padding: 5px 12px;
    border-radius: 15px;
    font-size: 0.8em; /* Trochu menší než nadpis, ale stále viditelné */
    font-weight: bold;
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.7);
}

.queueItem{
padding:15px; /* Větší padding */
border-bottom:1px solid #1e293b;
margin-bottom:12px; /* Větší mezera */
position: relative;
background: #020617aa; /* Lehce tmavší pozadí pro položky ve frontě */
border-radius: 8px;
box-shadow: 0 2px 8px rgba(0,0,0,0.3);
font-size: 1.3em; /* Větší text pro položky fronty */
transition: all 0.3s ease-in-out; /* Pro hladké přechody animace */
transform-origin: center center; /* Pro správnou animaci zvětšení */
}
.queueItem:last-child {
    border-bottom: none;
}
.queueItem b { color: #22d3ee; font-size: 1.1em;} /* Barva pro kontakt a mírně větší */
.queueItem .time { color: #cbd5f5; font-size: 0.9em; margin-top: 5px;} /* Trochu větší čas */
/* Styl pro čas do LISu */
.queueItem .countdown-time {
    font-size: 0.9em;
    color: #fbbf24; /* Oranžová barva pro odpočet */
    margin-top: 3px;
    font-weight: 500;
}
/* Blikání pro čas do LISu, když je na nule nebo záporný */
@keyframes countdownBlink {
    0%, 100% { color: #ef4444; text-shadow: 0 0 8px rgba(239, 68, 68, 0.7); } /* Červená s záři */
    50% { color: #ffeb3b; text-shadow: none; } /* Žlutá bez záře */
}
.queueItem .countdown-time.urgent {
    animation: countdownBlink 1s infinite;
}

/* ANIMACE PŘÍCHOZÍHO POŽADAVKU DO FRONTĚ - NYNÍ ZJEMNĚNÁ VERZE */
@keyframes newRequestPulse {
    0% {
        background: linear-gradient(145deg, #FFD700, #FFECB3); /* Světlejší žlutá/oranžová */
        box-shadow: 0 0 10px rgba(255, 215, 0, 0.6), 0 0 5px rgba(255, 236, 179, 0.4);
        transform: scale(1.02); /* Jen lehce větší */
        border-color: #FFD700;
        color: #333; /* Tmavší text, ale ne černá */
    }
    50% {
        background: linear-gradient(145deg, #FFECB3, #FFD700); /* Zase o něco světlejší */
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.8), 0 0 8px rgba(255, 236, 179, 0.6);
        transform: scale(1.03); /* Mírně větší pulz, ale stále jemný */
        border-color: #FFD700;
        color: #000;
    }
    100% {
        background: #020617aa; /* Zpět na původní tmavé pozadí */
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        transform: scale(1); /* Zpět na původní velikost */
        border-color: transparent;
        color: white; /* Zpět na bílý text */
    }
}
.queueItem.new-request-pulse {
    animation: newRequestPulse 3s forwards ease-in-out; /* Animace 3s dopředu */
}

.assign button{ /* Tlačítka pro přiřazení - tam myš je */
margin:2px;
padding:6px 10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
transition: background 0.2s ease, transform 0.1s ease;
}
.assign button:hover {
    background: #1a9a4e;
    transform: translateY(-1px);
}
.assign .deleteBtn{ /* Název z tvého nového kódu */
background:#ef4444;
}
.assign .deleteBtn:hover {
    background: #dc2626;
}

/* Inputy a Add button v setup screen */
input{ /* Vylepšený styl pro inputy */
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #1e293b;
background: #0f172a;
color: white;
box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
}
.addBtn{ /* Vylepšený styl pro addBtn */
width:100%;
padding:12px;
background: linear-gradient(90deg, #3b82f6, #60a5fa); /* Gradient pro Add button */
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-size: 1.1em;
font-weight: bold;
box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);
transition: all 0.3s ease;
}
.addBtn:hover { /* Hover pro Add button */
    background: linear-gradient(90deg, #60a5fa, #3b82f6);
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(59, 130, 246, 0.6);
}

/* FORMULÁŘ PRO VZKAZY V NASTAVENÍ */
.message-form-section {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid rgba(34, 197, 94, 0.3);
}
.message-form-section h4 {
    color: #a3e635;
    margin-bottom: 15px;
}
.message-input {
    width: calc(100% - 20px); /* Odečteme padding */
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #1e293b;
    background: #0f172a;
    color: white;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
}
.sendMessageBtn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #f6b73b, #fabf60); /* Oranžový gradient pro vzkazy */
    border: none;
    border-radius: 8px;
    color: white;
    cursor:pointer;
    font-size: 1.1em;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(246, 183, 59, 0.4);
    transition: all 0.3s ease;
}
.sendMessageBtn:hover {
    background: linear-gradient(90deg, #fabf60, #f6b73b);
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(246, 183, 59, 0.6);
}
/* SEZNAM AKTIVNÍCH VZKAZŮ V NASTAVENÍ */
.active-messages-list {
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid rgba(34, 197, 94, 0.3);
}
.active-messages-list h4 {
    color: #a3e635;
    margin-bottom: 10px;
}
.active-message-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #020617aa;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 8px;
    font-size: 0.9em;
}
.active-message-item span {
    flex-grow: 1;
    margin-right: 10px;
    color: #e0ffe0;
}
.deleteMessageBtn {
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    transition: background 0.2s ease;
}
.deleteMessageBtn:hover {
    background: #dc2626;
}

/* Optimalizace pro mobilní "Požadavky" (requestsScreen) */
#requestsScreen{ /* Název z tvého nového kódu */
    display:flex;
    align-items:center;
    justify-content:center;
    min-height: calc(100vh - 50px);
}
#requestsScreen > div { /* Kontejner pro formulář */
    max-width: 90%; /* Pro mobily širší */
    width: 400px; /* Max šířka pro desktopy */
    margin: 20px auto; /* Centrování a mezera */
    padding: 25px; /* Větší padding */

.flying-request {

    /* NOVÝ VÝCHOZÍ ZELENÝ GRADIENT */
    background: linear-gradient(145deg, #166534, #1a9a4e);

}

/* Keyframes pro pulzování středového létajícího požadavku */
@keyframes flyingRequestPulse {
    0%, 100% {
        box-shadow: 0 0 20px rgba(34, 197, 94, 0.7), 0 0 10px rgba(255, 255, 255, 0.3);
        transform: scale(1.1); /* Mírné zvětšení */

    50% {
        box-shadow: 0 0 40px rgba(34, 197, 94, 0.9), 0 0 15px rgba(255, 255, 255, 0.5);

    }
}

/* Třída pro aplikaci pulzování */
.flying-request.pulsing-center {

/* Styly pro text uvnitř létajícího prvku (pro snadnější úpravy barev) */

        1px 1px 2px rgba(0,0,0,0.8), /* Ostřejší a výraznější stín */

}

/* Specific styling for fullscreen animation */

    font-size: 68.75px;  /* Z 62.5px na 68.75px (62.5 * 1.1) */
    width: 77.34375vw;    /* Z 70.3125vw na 77.34375vw (70.3125 * 1.1) */

}
/* Ostatní vnitřní styly (flying-content, flying-label atd.) zůstávají stejné, protože jsou relativní k rodiči */

/* BLINK ANIMACE Z BETA 4.5.0 */

0%{background:#22c55e}

}

/* Styly pro počítadlo hotových požadavků */
.completed-count-indicator {
    position: absolute;
    bottom: 10px;

    width: 60px; /* Velikost indikátoru */

    /* Přechody pro plynulejší zobrazení/skrytí/aktualizaci */
    transition: background-color 0.3s ease, box-shadow 0.3s ease;
}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig={
    apiKey:"AIzaSyAhiCfh-Di_NdPO5rGM7CZFQGaSymcdWxI",
    authDomain:"lisyweb-df6d9.firebaseapp.com",
    databaseURL:"https://lisyweb-df6d9-default-rtdb.firebaseio.com/",
    projectId:"lisyweb-df6d9"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const LIS_COUNT=7;
let lisy=[];
let pozadavky=[];
let lastPozadavky = []; // Nové pole pro sledování předchozích požadavků
let lastLisy=[]; // Udržuje předchozí stav LISů pro detekci změn a animace
let messages = []; // Pole pro vzkazy
let lastMessagesCount = 0; // Pro detekci nových vzkazů

let audioContext = null; // Pro zvukovou notifikaci
let lastResetDate = localStorage.getItem('lastResetDate') || new Date().toDateString(); // Datum posledního resetu
let requestCountdownIntervals = {}; // Objekt pro uchování intervalů pro každý požadavek ve frontě

// Pro rolování vzkazů
let currentMessageIndex = 0; // Sleduje aktuální vzkaz, který se zobrazuje
let messageRotationTimeout; // Timeout pro střídání zpráv

// Funkce pro přehrání tónu (stejná jako dříve, jen s jinou frekvencí pro notifikaci fronty)
function playTone(frequency = 900, duration = 0.25) {
    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    const o = audioContext.createOscillator();
    const g = audioContext.createGain();
    o.frequency.value = frequency; 
    o.connect(g);
    g.connect(audioContext.destination);
    o.start();
    o.stop(audioContext.currentTime + duration);
}

function emptyLis(){ return {kontakt:"",prurez:"",jmeno:"",time:"", completedToday: 0} } // Přidán completedToday
function timeNow(){ return new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}) }

// Funkce pro aktualizaci mainHeader a spuštění blinku hlavičky
function updateMainHeaderDisplay(text){
    const header=document.getElementById("mainHeader");
    if(!header) return; // Zajištění, že element existuje

    // Aktualizujeme text pouze pokud se liší, abychom zbytečně nespouštěli animaci
    if (header.innerText !== text) {
        header.innerText = text;
        // Spustíme blink efekt hlavičky, pokud text není "---"
        if (text !== "---") {
            header.classList.add("blink"); 
            // Odstraníme blink po delší době nebo když se text změní na "---"
            setTimeout(() => header.classList.remove("blink"), 8000); // Blink trvá 8s
        } else {
            header.classList.remove("blink"); 
        }
    }
}

onValue(ref(db,'lisy'),async snap=>{ // Asynchronní, protože animace jsou asynchronní
  const data = snap.val();
  const currentLisy = Array.from({length:LIS_COUNT}, (v, i) => {
      const lisData = data && data[i] ? data[i] : emptyLis();
      // Pokud LIS data z Firebase nemají 'completedToday', nastavíme na 0
      if (lisData.completedToday === undefined) {
          lisData.completedToday = 0;
      }
      return lisData;
  });
  
  // Kontrola pro resetování denních počítadel o půlnoci
  const today = new Date().toDateString();
  if (today !== lastResetDate) {
      console.log("Resetting daily counts for new day.");
      lastResetDate = today;
      localStorage.setItem('lastResetDate', today);
      for (let i = 0; i < LIS_COUNT; i++) {
          await update(ref(db, `lisy/${i}`), { completedToday: 0 });
      }
  }

  // Procházíme LISy a detekujeme změny pro blink a animace
  for (let i = 0; i < LIS_COUNT; i++) {
    const lis = currentLisy[i] || emptyLis();
    const oldLis = lastLisy[i] || emptyLis();

    const hasContact = !!lis.kontakt;
    const oldHasContact = !!(oldLis && oldLis.kontakt);
    const dataChanged = (hasContact && (!oldHasContact || oldLis.kontakt !== lis.kontakt || oldLis.prurez !== lis.prurez || oldLis.jmeno !== lis.jmeno));
    
    if (hasContact && dataChanged) {
        // Přehrát tón pro LIS
        playTone(900, 0.25); // Původní tón pro LIS
        // Spustit blink pro kartu
        const card=document.getElementById("lis"+i);
        const prod=document.getElementById("prodLis"+i);
        
        if(card) {
            card.classList.add("active");
            setTimeout(()=>{
                card.classList.remove("active");
                card.classList.add("assigned");
            },1000);
        }
        if(prod) { // blink i na prod kartě
            prod.classList.add("active");
            setTimeout(()=>{
                prod.classList.remove("active");
                prod.classList.add("assigned");
            },1000);
        }
    }
    
    // --- LÉTAJÍCÍ POŽADAVEK ANIMACE ---
    // Spustit animaci, pokud je v LISu nastaveno `assignedAnimation`
    if (lis.assignedAnimation) {
        const reqDetails = lis.assignedAnimation.requestDetails;
        const currentScreenId = document.getElementById("setupScreen").style.display === "block" ? "setupScreen" : 
                                document.getElementById("productionScreen").style.display === "block" ? "productionScreen" :
                                null;

        const targetElement = document.getElementById(`lis${i}`); // Pro obrazovku Nastavení
        const prodTargetElement = document.getElementById(`prodLis${i}`); // Pro Výrobní obrazovku
        
        // Okamžitě aktualizovat mainHeader s textem z animace
        const headerText = `${reqDetails.kontakt} - ${reqDetails.prurez} - ${reqDetails.jmeno} → LIS ${reqDetails.targetLisIndex + 1}`;
        updateMainHeaderDisplay(headerText);

        if (currentScreenId === "productionScreen" && prodTargetElement) {
            await animateFlyingRequestFullscreen(prodTargetElement, reqDetails);
        } else if (currentScreenId === "setupScreen" && targetElement) {
            // Pokusíme se najít zdrojový element ve frontě.
            // Na jiných zařízeních, než které přiřadilo, element ve frontě už nebude,
            // takže animace vyletí ze středu.
            const sourceElement = document.getElementById(`request-${reqDetails.key}`);
            if (sourceElement) {
                await animateFlyingRequest(sourceElement, targetElement, reqDetails);
            } else { // Fallback, pokud zdrojový element už není v DOMu (např. po refresh)
                await animateFlyingRequestFromCenter(targetElement, reqDetails);
            }
        }
        // Důležité: Po spuštění animace (nebo i když se nespustí kvůli neviditelné obrazovce),
        // smažeme assignedAnimation z DB, aby se nespustila znovu při dalším refresh/načtení.
        await update(ref(db, `lisy/${i}`), { assignedAnimation: null });
    }
  }

  lisy = currentLisy;
  lastLisy = JSON.parse(JSON.stringify(lisy)); // Aktualizuje lastLisy pro příští cyklus

  renderAll();
});

// Funkce pro formátování milisekund na M:SS:ms (nyní počítá elapsed time)
function formatMillisecondsElapsed(ms) {
    if (ms < 0) ms = 0; 
    const minutes = Math.floor(ms / (1000 * 60));
    const seconds = Math.floor((ms % (1000 * 60)) / 1000);
    const milliseconds = Math.floor((ms % 1000) / 100); // První milisekundová číslice

    return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}:${String(milliseconds)}`;
}

// Funkce pro aktualizaci odpočtu (nyní počítá elapsed time)
function updateCountdown(requestKey, targetElementId) {
    const p = pozadavky.find(req => req.key === requestKey);
    const countdownEl = document.getElementById(targetElementId);

    if (p && countdownEl) {
        const timeElapsed = Date.now() - p.time; // Kolik času uplynulo od přidání
        countdownEl.textContent = `Čeká: ${formatMillisecondsElapsed(timeElapsed)}`;

        // Zkontrolujeme, zda čas čekání překročil limit (initialCountdownMs)
        if (timeElapsed > p.initialCountdownMs && !countdownEl.classList.contains('urgent')) {
            countdownEl.classList.add('urgent');
        } else if (timeElapsed <= p.initialCountdownMs && countdownEl.classList.contains('urgent')) {
             countdownEl.classList.remove('urgent');
        }
    } else if (countdownEl) {
        // Pokud požadavek neexistuje, ale element ano, zastavíme interval
        clearInterval(requestCountdownIntervals[requestKey]);
        delete requestCountdownIntervals[requestKey];
        countdownEl.remove(); // Odstraníme element
    }
}

onValue(ref(db,'pozadavky'), snap => {
  const data = snap.val();
  const currentPozadavky = data ? Object.entries(data).map(([k,v])=>({...v,key:k})).sort((a,b)=>a.time-b.time) : [];
  
  // Detekce nových požadavků pro blikání a zvukovou notifikaci
  // Přehrání tónu pouze pokud se počet požadavků zvýšil a nejedná se o první načtení
  if (lastPozadavky.length > 0 && currentPozadavky.length > lastPozadavky.length) {
      playTone(600, 0.1); // Nový, jemnější tón pro frontu
  }

  currentPozadavky.forEach(p => {
      // Pokud požadavek s tímto klíčem nebyl v lastPozadavky, je to nový požadavek
      if (!lastPozadavky.some(oldP => oldP.key === p.key)) {
          // Spustíme blikání po krátké prodlevě, aby se element stihl vykreslit
          // Tato logika musí být vyvolána pro OBĚ fronty
          setTimeout(() => {
              const setupQueueItem = document.getElementById(`request-${p.key}`);
              const prodQueueItem = document.getElementById(`prodRequest-${p.key}`); // Pro výrobní frontu

              if (setupQueueItem) {
                  setupQueueItem.classList.add('new-request-pulse');
                  setTimeout(() => {
                      setupQueueItem.classList.remove('new-request-pulse');
                  }, 3000); // Doba trvání animace newRequestPulse
              }
              if (prodQueueItem) { // Pro výrobní frontu
                  prodQueueItem.classList.add('new-request-pulse');
                  setTimeout(() => {
                      prodQueueItem.classList.remove('new-request-pulse');
                  }, 3000); 
              }
          }, 50); 
      }
      // Spustíme odpočet, pokud ještě neběží
      if (!requestCountdownIntervals[p.key]) {
           requestCountdownIntervals[p.key] = setInterval(() => {
               updateCountdown(p.key, `countdown-${p.key}`);
               updateCountdown(p.key, `prod-countdown-${p.key}`);
           }, 100); // Aktualizovat každých 100ms
       }
  });

  // Zastavíme a odstraníme intervaly pro požadavky, které již nejsou ve frontě
  Object.keys(requestCountdownIntervals).forEach(key => {
      if (!currentPozadavky.some(p => p.key === key)) {
          clearInterval(requestCountdownIntervals[key]);
          delete requestCountdownIntervals[key];
      }
  });

  pozadavky = currentPozadavky;
  lastPozadavky = JSON.parse(JSON.stringify(currentPozadavky)); // Aktualizujeme lastPozadavky
  renderAll();
});

// Listener pro zprávy
onValue(ref(db, 'messages'), snap => {
    const data = snap.val();
    const currentMessages = data ? Object.entries(data).map(([k,v])=>({...v,key:k})).sort((a,b)=>a.time-b.time) : [];

    // Filtrování zpráv starších než 24 hodin a jejich smazání z DB
    const now = Date.now();
    currentMessages.forEach(msg => {
        if (now - msg.time > 24 * 60 * 60 * 1000) { // 24 hodin v ms
            remove(ref(db, 'messages/' + msg.key));
        }
    });

    messages = currentMessages.filter(msg => now - msg.time <= 24 * 60 * 60 * 1000); // Aktualizujeme pole messages
    renderMessages();
});

function renderAll(){
    renderLisy("rowTop","rowBottom",true); // Používáme tvé ID "rowTop", "rowBottom"
    renderLisy("prodTop","prodBottom",false);
    renderQueue("queueList"); // Používáme tvé ID "queueList"
    renderProductionQueue(); // Používáme tvé ID "prodQueue"
    updateQueueCounts(); // Aktualizace počtů ve frontě
}

function renderLisy(topID, bottomID, isSetup){
    const top=document.getElementById(topID);
    const bottom=document.getElementById(bottomID);
    if(!top || !bottom) return;
    top.innerHTML=""; bottom.innerHTML="";

    for(let i=0; i<LIS_COUNT; i++){
        const d = lisy[i] || emptyLis();
        const assigned = d.kontakt !== "";
        // Dynamické ID pro obě obrazovky
        const cardId = isSetup ? `lis${i}` : `prodLis${i}`;
        
        const html = `
            <div class="card ${assigned?'assigned':''}" id="${cardId}">
                <div class="lis">LIS ${i+1}</div>
                <div class="kontakt">${d.kontakt||"---"}</div>
                <div class="prurez">${d.prurez||"---"}</div>
                <div class="jmeno">${d.jmeno||"---"}</div>
                <div class="time">${d.time?timeNow():""}</div>
                ${isSetup ? `<button class="hotovo" onclick="clearLis(${i})">HOTOVO</button>` : ""}
                <div class="completed-count-indicator">
                    <span>${d.completedToday || 0}</span>
                </div>
            </div>
        `;
        if(i<3) top.innerHTML += html;
        else bottom.innerHTML += html;

// Renderování vzkazů do topbaru a do nastavení
function renderMessages() {
    const messageBoardDiv = document.getElementById('messageBoard');
    const activeMessagesContainer = document.getElementById('activeMessagesContainer');
    const messageBoardContainer = document.getElementById('messageBoardContainer');
    if (!messageBoardDiv || !activeMessagesContainer || !messageBoardContainer) return;

    messageBoardDiv.innerHTML = ''; // Vyčistíme message board
    activeMessagesContainer.innerHTML = '';

    // Zrušíme případné předchozí timeouty
    clearTimeout(messageRotationTimeout);

    if (messages.length > 0) {
        // Zobrazí se vždy jen jeden vzkaz z `messages` pole (aktuální index)
        const currentMessage = messages[currentMessageIndex];
        const messageItemWrapper = document.createElement('div');
        messageItemWrapper.className = 'message-item-wrapper';
        messageItemWrapper.id = `msg-wrapper-${currentMessage.key}`;
        
        const messageItem = document.createElement('span'); // text je teď uvnitř spanu
        messageItem.className = 'message-item urgent-message-blink';
        messageItem.textContent = currentMessage.text;
        
        messageItemWrapper.appendChild(messageItem);
        messageBoardDiv.appendChild(messageItemWrapper);

        // Nastaví proměnné pro CSS animaci
        const containerWidth = messageBoardContainer.clientWidth - 30; // Šířka kontejneru mínus padding
        
        // Měříme skutečnou šířku textu uvnitř spanu, aby byla přesná
        // (Musíme ji změřit až po přidání do DOMu a aplikování CSS stylů)
        const tempMeasuringElement = document.createElement('span');
        tempMeasuringElement.style.visibility = 'hidden';
        tempMeasuringElement.style.whiteSpace = 'nowrap';
        tempMeasuringElement.style.fontSize = getComputedStyle(messageItem).fontSize;
        tempMeasuringElement.style.fontWeight = getComputedStyle(messageItem).fontWeight;
        tempMeasuringElement.textContent = currentMessage.text;
        document.body.appendChild(tempMeasuringElement);
        const actualTextWidth = tempMeasuringElement.offsetWidth;
        document.body.removeChild(tempMeasuringElement);

        const scrollSpeedPxPerSec = 40; // Rychlost rolování v px/s
        const initialDelaySeconds = 1; // Pauza před prvním rolováním
        // Celková vzdálenost, kterou text urazí (od pravého okraje do levého, + šířka kontejneru pro plynulou smyčku)
        const totalTravelDistance = actualTextWidth + containerWidth + 20; // + mezera mezi opakováními
        const marqueeDuration = totalTravelDistance / scrollSpeedPxPerSec; // Čas trvání animace
        
        // Nastavíme cílovou pozici pro transform: translateX, aby se text posunul o celou svou šířku + šířku kontejneru
        messageItemWrapper.style.setProperty('--scroll-target', `-${actualTextWidth + containerWidth + 20}px`);
        messageItemWrapper.style.setProperty('--marquee-duration', `${marqueeDuration}s`);

        // Spuštění blikání kontejneru při novém vzkazu
        const isNewMessage = lastMessagesCount < messages.length || (messages.length > 0 && lastMessagesCount === 0);
        if (isNewMessage) { 
            messageBoardContainer.classList.add('flash');
            setTimeout(() => {
                messageBoardContainer.classList.remove('flash');
            }, 1500); // Doba trvání blikání kontejneru
            playTone(800, 0.2); // Přehrát zvuk pro nový vzkaz
        }

        // Nastavíme timeout pro zobrazení další zprávy, až se tato "dorošluje" jeden cyklus
        // Duration * 1000 pro ms, + initialDelay pro pauzu
        messageRotationTimeout = setTimeout(() => {
            currentMessageIndex = (currentMessageIndex + 1) % messages.length;
            renderMessages(); // Znovu zavoláme renderMessages pro zobrazení další zprávy
        }, (marqueeDuration * 1000) + (initialDelaySeconds * 1000)); 

        // Renderování aktivních vzkazů do nastavení (beze změny)
        messages.forEach(msg => {
            const activeMessageItem = document.createElement('div');
            activeMessageItem.className = 'active-message-item';
            activeMessageItem.innerHTML = `
                <span>${new Date(msg.time).toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' })} - ${msg.text}</span>
                <button class="deleteMessageBtn" onclick="deleteMessage('${msg.key}')">Smazat</button>
            `;
            activeMessagesContainer.appendChild(activeMessageItem);
        });

    } else {
        messageBoardDiv.innerHTML = '<div class="message-item">Žádné aktivní vzkazy.</div>';
    }
    lastMessagesCount = messages.length; // Aktualizace pro detekci nových zpráv
}

// Funkce assign upravena pro uložení assignedAnimation flagu
window.assignRequest=async function(lisIndex, requestKey){ // Používám "assignRequest" z tvého nového kódu
  const p=pozadavky.find(req => req.key === requestKey);
  if(!p) return;

  const currentLis = lisy[lisIndex];
  let newCompletedToday = currentLis.completedToday || 0;

  // Pokud je LIS již obsazen, znamená to, že předchozí úkol byl dokončen.
  if (currentLis.kontakt !== "") {
      newCompletedToday++;
  }

  await set(ref(db,`lisy/${lisIndex}`),{
    kontakt:p.kontakt,
    prurez:p.prurez,
    jmeno:p.jmeno,
    time:Date.now(),
    completedToday: newCompletedToday, // Aktualizujeme počet dokončených úkolů
    assignedAnimation: { 
      targetLisIndex: lisIndex,
      requestDetails: { kontakt: p.kontakt, prurez: p.prurez, jmeno: p.jmeno, key: p.key, targetLisIndex: lisIndex } 
    }
  });
  remove(ref(db,'pozadavky/'+p.key));
}

async function animateFlyingRequest(sourceEl, targetEl, requestData) {
    const flyingEl = document.createElement('div');
    flyingEl.className = 'flying-request';
    flyingEl.innerHTML = `
        <div class="flying-content">
            <div class="flying-label">LIS ${requestData.targetLisIndex + 1}</div>
            <div class="flying-kontakt">${requestData.kontakt}</div>
            <div class="flying-prurez">${requestData.prurez}</div>
            <div class="flying-jmeno">${requestData.jmeno}</div> <!-- Jmeno zpět -->
        </div>
    `;
    document.body.appendChild(flyingEl);

    const targetLisCard = document.getElementById(`lis${requestData.targetLisIndex}`); // Cílová karta LIS
    const targetRect = targetLisCard.getBoundingClientRect(); // Získání pozice cílové karty
    const sourceRect = sourceEl.getBoundingClientRect();

    // Pevná cílová velikost na středu obrazovky
    const midScreenWidth = 300;
    const midScreenHeight = 120;
    const midX = window.innerWidth / 2 - (midScreenWidth / 2);
    const midY = window.innerHeight / 2 - (midScreenHeight / 2);

    // Krok 1: Inicializace a nastavení počátečního stavu (skrytý, na pozici sourceEl)
    flyingEl.style.left = '0';
    flyingEl.style.top = '0';
    flyingEl.style.width = `${sourceRect.width}px`;
    flyingEl.style.height = `${sourceRect.height}px`;
    flyingEl.style.transform = `translate(${sourceRect.left}px, ${sourceRect.top}px) scale(1)`;
    flyingEl.style.opacity = '0'; // Začínáme s neviditelným prvkem

    await new Promise(requestAnimationFrame);

    // Nastavíme transition pro první fázi (ze zdroje do středu)
    flyingEl.style.transition = `transform 0.8s ease-in-out, opacity 0.8s ease-in-out, width 0.8s ease-in-out, height 0.8s ease-in-out, background 0.8s ease-in-out, box-shadow 0.8s ease-in-out`;

    flyingEl.style.opacity = '1'; // Stane se viditelným
    flyingEl.style.transform = `translate(${midX}px, ${midY}px) scale(1.1)`; // Let do středu a mírné zvětšení
    flyingEl.style.width = `${midScreenWidth}px`;
    flyingEl.style.height = `${midScreenHeight}px`;

    // --- STYLY PRO STŘEDOVÝ STAV (ZELENÝ, PULZUJÍCÍ) --- aplikované hned s příchodem na střed
    flyingEl.style.background = 'linear-gradient(145deg, #22c55e, #1a9a4e)'; /* Zelený gradient */
    flyingEl.style.boxShadow = '0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.6)'; /* Zářivý stín */
    flyingEl.classList.add('pulsing-center'); // Aktivujeme pulzující animaci

    // Čekáme na dokončení první fáze animace
    await new Promise(res => flyingEl.addEventListener('transitionend', res, { once: true }));

    // Krok 2: Pauza uprostřed s pulzováním
    await delay(3000); // Přesně 3 sekundy pauza
    flyingEl.classList.remove('pulsing-center'); // Vypneme pulzování

    // Krok 3: Let z centra do cílového LISu
    const finalScale = 0.5; // Zmenšení při dosednutí do LISu
    const finalX = targetRect.left + (targetRect.width / 2) - (midScreenWidth * finalScale / 2);
    const finalY = targetRect.top + (targetRect.height / 2) - (midScreenHeight * finalScale / 2);

    // Nastavení transition pro druhou fázi přeletu (ze středu do cíle)
    flyingEl.style.transition = `transform 0.8s ease-in-out, opacity 0.8s ease-in-out, width 0.8s ease-in-out, height 0.8s ease-in-out, background 0.8s ease-in-out, box-shadow 0.8s ease-in-out`;
    flyingEl.style.transform = `translate(${finalX}px, ${finalY}px) scale(${finalScale})`;
    flyingEl.style.width = `${midScreenWidth * finalScale}px`;
    flyingEl.style.height = `${midScreenHeight * finalScale}px`;
    flyingEl.style.opacity = '0'; // Zprůhledníme prvek
    flyingEl.style.background = 'transparent';
    flyingEl.style.boxShadow = 'none';

    // Čekáme na dokončení druhé fáze animace, pak prvek odstraníme
    await new Promise(res => flyingEl.addEventListener('transitionend', res, { once: true }));
    flyingEl.remove();
}

    }
});

setInterval(()=>{
  const production = document.getElementById("productionScreen"); /* Název z tvého nového kódu */
  if(production.style.display !== "block") return;
  const q = production.querySelector(".queue");
  if(!q) return;
  q.scrollTop += 1;
  if(q.scrollTop + q.clientHeight >= q.scrollHeight) q.scrollTop = 0;
},100);

</script>
