<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEMMSOFT 4.5 Testing</title>

<style>
/* Základní styly */
body{
font-family: 'Segoe UI', Arial, sans-serif; /* Moderní bezpatkový font */
background:url("background.png") center/cover fixed; /* Předpokládá se existující background.png */
margin:0;
color:white;
overflow-x: hidden; /* Zamezí horizontálnímu scrollu kvůli animacím */
}
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
z-index:-1;
}
.topbarContainer{ /* Název z tvého nového kódu */
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 25px;
background: rgba(0, 0, 0, 0.6); /* Lehce průhledné pozadí pro topbar */
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
transition: all 0.3s ease; /* Pro animaci skrytí/zobrazení */
}
/* ----- OPRAVENÁ TŘÍDA PRO SKRYTÍ TOPBARU ----- */
.topbarContainer.hidden { /* Název z tvého nového kódu */
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none; /* Zakáže interakci s neviditelným topbarem */
}

/* VYLEPŠENÝ TEXT LOGA */
.kemmsTop { /* Název z tvého nového kódu */
    font-size: 38px; /* Trochu větší */
    font-weight: 900; /* Extra bold */
    background: linear-gradient(45deg, #22c55e, #34d399); /* Původní zelená pro logo */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 15px rgba(34, 197, 94, 0.8), 0 0 25px rgba(52, 211, 153, 0.6); /* Zářivý neonový stín */
    letter-spacing: 1px; /* Jemné rozestupy */
    transition: all 0.3s ease;
    animation: logoPulse 4s infinite alternate ease-in-out;
}
/* Keyframes pro pulzování loga */
@keyframes logoPulse {
    0% {
        background: linear-gradient(45deg, #22c55e, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 15px rgba(34, 197, 94, 0.8), 0 0 25px rgba(52, 211, 153, 0.6);
    }
    50% {
        background: linear-gradient(45deg, #166534, #1a9a4e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 8px rgba(22, 101, 52, 0.7);
    }
    100% {
        background: linear-gradient(45deg, #22c55e, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 15px rgba(34, 197, 94, 0.8), 0 0 25px rgba(52, 211, 153, 0.6);
    }
}

/* Styl pro hodiny - ZVĚTŠENÝ */
.realtime-clock {
    font-size: 4.2em; /* Původně 1.8em, nyní zvětšeno */
    font-weight: bold;
    color: #cbd5f5; /* Světlejší barva */
    margin-left: auto; /* Posune hodiny doprostřed mezi logo a tlačítka */
    margin-right: 20px; /* Mezera před tlačítky */
    text-shadow: 0 0 8px rgba(121, 187, 255, 0.5); /* Jemný svítící efekt */
}

/* MESSAGE BOARD - NOVÉ A VYLEPŠENÉ */
.message-board-container {
    flex-grow: 1; /* Zabere co nejvíce místa */
    margin: 0 20px; /* Mezera od hodin a tlačítek */
    height: 40px; /* Pevná výška */
    overflow: hidden; /* Skryje texty, které se nevejdou */
    position: relative;
    background: rgba(0, 0, 0, 0.3); /* Lehce tmavší pozadí */
    border-radius: 8px;
    display: flex; /* Centruje vzkazy vertikálně */
    align-items: center;
    padding: 0 15px;
    box-shadow: inset 0 0 8px rgba(34, 197, 94, 0.2); /* Jemný vnitřní stín */
    transition: all 0.3s ease;
}

/* Animace blikání kontejneru při novém vzkazu */
@keyframes boardFlash {
    0% { background: rgba(0, 0, 0, 0.3); box-shadow: inset 0 0 8px rgba(34, 197, 94, 0.2); }
    50% { background: rgba(255, 165, 0, 0.2); box-shadow: inset 0 0 20px rgba(255, 165, 0, 0.8), 0 0 10px rgba(255, 165, 0, 0.6); } /* Oranžové blikání */
    100% { background: rgba(0, 0, 0, 0.3); box-shadow: inset 0 0 8px rgba(34, 197, 94, 0.2); }
}
.message-board-container.flash {
    animation: boardFlash 1.5s ease-out;
}

.message-board {
    position: relative; /* Změna na relative */
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center; /* Centruje text vertikálně */
    overflow: hidden; /* Skryje přetékající text */
}

.message-item-wrapper { /* Nový wrapper pro plynulé rolování */
    display: inline-block; /* Aby se vešel do řádku */
    white-space: nowrap; /* Zabrání zalamování textu */
    position: absolute; /* Umožní animaci zprava doleva */
    animation: marquee-effect linear infinite; /* Aplikuje animaci rolování */
    animation-duration: var(--marquee-duration); /* Dynamicky nastavená délka animace */
    left: 100%; /* Startuje vpravo */
    transform: translateX(0); /* Zajištění výchozí pozice */
}

.message-item {
    font-size: 30px; /* Zvětšeno, jeden stupeň menší než KEMMSOFT (38px -> ~30px) */
    font-weight: 500;
    color: #e0ffe0; /* Světle zelený text */
    padding: 0; /* Padding je na wrapperu */
    line-height: 1.2; /* Mezera mezi řádky */
}

/* Keyframes pro marquee animaci */
@keyframes marquee-effect {
    0% { transform: translateX(0%); } /* Začíná na 0% šířky wrapperu */
    100% { transform: translateX(var(--scroll-target)); } /* Roluje až na target */
}

/* Blikání NOVÉHO vzkazu (oranžové a neustálé) */
@keyframes messageItemBlink {
    0%, 100% { color: #FFECB3; text-shadow: 0 0 5px rgba(255, 236, 179, 0.7); } /* Světle oranžová */
    50% { color: #FFA500; text-shadow: 0 0 10px rgba(255, 165, 0, 0.9); } /* Plná oranžová */
}
.message-item.urgent-message-blink {
    /* Blink animace je teď na message-item, aby rolování nebylo ovlivněno */
    animation: messageItemBlink 2s infinite alternate ease-in-out; 
}

/* VYLEPŠENÁ NAVIGAČNÍ TLAČÍTKA */
.topbar button{ /* Název z tvého nového kódu */
padding:12px 22px; /* Větší padding */
margin-left:10px; /* Větší mezera */
border:none;
border-radius:8px; /* Více zaoblené rohy */
background: linear-gradient(135deg, #22c55e, #1a9a4e); /* Gradient */
color:white;
cursor:pointer;
font-size: 1.1em; /* Větší text */
font-weight: 600; /* Bold */
box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); /* 3D stín */
transition: all 0.3s ease; /* Plynulý přechod */
position: relative;
overflow: hidden; /* Pro efekty */
}
.topbar button::before { /* Jemná světelná záře */
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.1);
    transform: skewX(-30deg);
    transition: all 0.5s ease;
}
.topbar button:hover::before {
    left: 100%;
}
.topbar button:hover {
    background: linear-gradient(135deg, #1a9a4e, #22c55e); /* Otočený gradient při hoveru */
    transform: translateY(-3px) scale(1.02); /* Mírné zvednutí a zvětšení */
    box-shadow: 0 8px 25px rgba(34, 197, 94, 0.6); /* Výraznější stín */
}
/* Aktivní tlačítko */
.topbar button.active-nav {
    background: linear-gradient(135deg, #0f4f2c, #166534); /* Tmavší zelená pro aktivní */
    box-shadow: 0 2px 10px rgba(34, 197, 94, 0.8), inset 0 0 8px rgba(34, 197, 94, 0.6);
    transform: translateY(0);
    border: 1px solid #22c55e;
}

.header{
text-align:center;
font-size:68px; /* Pro TV */
background:#111827cc;
padding:10px;
transition: all 0.3s ease;
text-shadow: 2px 2px 8px rgba(0,0,0,0.7); /* Vylepšený stín */
border-bottom: 2px solid rgba(34, 197, 94, 0.5); /* Moderní linka */
min-height: 100px; /* Zajistí, že hlavička má vždy výšku */
display: flex; /* Pro centrování textu vertikálně */
align-items: center;
justify-content: center;
}
@keyframes headerBlink {
  0%, 100% { color: #22c55e; text-shadow: 0 0 15px #22c55e; }
  50% { color: #ffffff; text-shadow: none; }
}
.header.blink { animation: headerBlink 1s infinite; } /* Název z tvého nového kódu */

.layout{
display:grid;
grid-template-columns:4fr 1.3fr;
gap:20px;
padding:20px;
}
.rowTop{ display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:20px; }
.rowBottom{ display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }

/* KARTY LISŮ - VIZUÁLNÍ TUNING PRO VÝROBNÍ OBRAZOVKU */
.card{
background: linear-gradient(145deg, #020617ee, #111827ee); /* Dynamický tmavý gradient */
padding:25px;
border-radius:22px; /* Více zaoblené rohy */
text-align:center;
transition: all .4s ease-out; /* Dlouhý a plynulý transition pro všechny stavy */
position: relative;
box-shadow: 0 8px 20px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.05); /* Hluboký vnější a jemný vnitřní stín */
border: 1px solid rgba(34, 197, 94, 0.15); /* Jemný okraj */
}

/* Stav PŘIŘAZENO (ASSIGNED) */
.card.assigned{
background: linear-gradient(145deg, #16653499, #1a9a4e99); /* Zelenější, ale stále průhledný gradient */
color: #e0ffe0; /* Světle zelený text, aby vynikl */
box-shadow: 0 0 30px rgba(34, 197, 94, 0.7), inset 0 0 15px rgba(34, 197, 94, 0.5); /* Zářivější zelený stín */
border-color: #22c55e;
animation: pulseBorder 2s infinite ease-in-out; /* Nová pulzující animace okraje */
}
/* Keyframes pro jemné pulzování okraje pro obsazené LISy */
@keyframes pulseBorder {
    0% { border-color: rgba(34, 197, 94, 0.5); box-shadow: 0 0 15px rgba(34, 197, 94, 0.4), inset 0 0 8px rgba(34, 197, 94, 0.3); }
    50% { border-color: rgba(34, 197, 94, 0.8); box-shadow: 0 0 25px rgba(34, 197, 94, 0.7), inset 0 0 12px rgba(34, 197, 94, 0.5); }
    100% { border-color: rgba(34, 197, 94, 0.5); box-shadow: 0 0 15px rgba(34, 197, 94, 0.4), inset 0 0 8px rgba(34, 197, 94, 0.3); }
}

/* Stav AKTIVNÍ (ACTIVE) - při novém přiřazení */
.card.active{ 
background: linear-gradient(145deg, #22c55e, #1a9a4e); /* Plný, jasný zelený gradient */
color: #000; /* Text černej, maximální kontrast */
box-shadow: 0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.6); /* Super zářivá, bílý okraj */
transform: scale(1.08); /* Trochu větší zvětšení */
border-color: #22c55e;
animation: cardActiveScale 1.2s forwards; /* Vlastní animace pro active stav */
}
@keyframes cardActiveScale {
    0% { transform: scale(1); box-shadow: 0 8px 20px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.05); }
    50% { transform: scale(1.1); box-shadow: 0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.5); }
    100% { transform: scale(1.08); box-shadow: 0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.6); }
}

/* LIS text - VYLEPŠENÝ STYL */
.lis {
    font-size: 40px; /* Ještě větší text LIS */
    font-weight: 900; /* Extra bold */
    background: linear-gradient(45deg, #6ee7b7, #34d399); /* Jasnější zelený gradient */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
        6px 6px 12px rgba(0,0,0,0.8), /* Výraznější, hlubší stín */
        8px 8px 16px rgba(0,0,0,0.7);
    transition: all 0.3s ease;
    margin-bottom: 25px; /* Více místa */
}
/* Animace textu LIS při aktivním stavu */
@keyframes lisTextBlink {
    0%, 100% { transform: scale(1); opacity: 1; text-shadow: 6px 6px 12px rgba(0,0,0,0.8); }
    50% { transform: scale(1.1); opacity: 0.9; text-shadow: 8px 8px 16px rgba(0,0,0,0.9); }
    100% { transform: scale(1); opacity: 1; text-shadow: 6px 6px 12px rgba(0,0,0,0.8); } /* Zpět na původní */
}
.card.active .lis {
    animation: lisTextBlink 1.2s ease forwards;
}

/* Styly pro data na kartě - JEŠTĚ VĚTŠÍ PRO TV */
.card .kontakt{font-size:38px;color:#22d3ee; margin-top: 30px; font-weight: 800;} /* Ještě větší */
.card .prurez{font-size:34px;color:#fbbf24; margin-top: 25px; font-weight: 700;} /* Ještě větší */
.card .jmeno{font-size:32px;color:#a3e635; margin-top: 25px; font-weight: 700;} /* Ještě větší */
.card .time{font-size:24px;color:#cbd5f5;margin-top:20px; font-weight: 500;} /* Větší */

.hotovo{ /* Tlačítko HOTOVO - jen pro nastavení, tam myš je */
margin-top:15px;
padding:8px 18px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer;
box-shadow: 0 4px 8px rgba(239, 68, 68, 0.4);
transition: all 0.3s ease;
}
.hotovo:hover {
    background: #dc2626;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(239, 68, 68, 0.6);
}

/* FRONTĚ A JEJÍ POLOŽKY - VYLEPŠENÍ A PULZOVÁNÍ PŘI PŘÍCHODU */
.queue{
background: linear-gradient(145deg, #020617ee, #111827ee); /* Stejný gradient jako karty */
padding:20px;
border-radius:22px;
max-height:80vh;
overflow-y:auto;
box-shadow: 0 8px 20px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.05);
border: 1px solid rgba(34, 197, 94, 0.15);
}
/* Upravený queueTitle pro zobrazení počtu */
.queueTitle { 
    color: #22c55e;
    text-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
    margin-bottom: 15px;
    font-size: 1.8em; /* Větší nadpis fronty */
    display: flex; /* Pro zarovnání textu a čísla */
    justify-content: space-between; /* Rozprostření nadpisu a počtu */
    align-items: center;
}
.queueTitle .count {
    background-color: #22c55e; /* Zelené pozadí pro číslo */
    color: black; /* Černý text */
    padding: 5px 12px;
    border-radius: 15px;
    font-size: 0.8em; /* Trochu menší než nadpis, ale stále viditelné */
    font-weight: bold;
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.7);
}

.queueItem{
padding:15px; /* Větší padding */
border-bottom:1px solid #1e293b;
margin-bottom:12px; /* Větší mezera */
position: relative;
background: #020617aa; /* Lehce tmavší pozadí pro položky ve frontě */
border-radius: 8px;
box-shadow: 0 2px 8px rgba(0,0,0,0.3);
font-size: 1.3em; /* Větší text pro položky fronty */
transition: all 0.3s ease-in-out; /* Pro hladké přechody animace */
transform-origin: center center; /* Pro správnou animaci zvětšení */
}
.queueItem:last-child {
    border-bottom: none;
}
.queueItem b { color: #22d3ee; font-size: 1.1em;} /* Barva pro kontakt a mírně větší */
.queueItem .time { color: #cbd5f5; font-size: 0.9em; margin-top: 5px;} /* Trochu větší čas */
/* Styl pro čas do LISu */
.queueItem .countdown-time {
    font-size: 0.9em;
    color: #fbbf24; /* Oranžová barva pro odpočet */
    margin-top: 3px;
    font-weight: 500;
}
/* Blikání pro čas do LISu, když je na nule nebo záporný */
@keyframes countdownBlink {
    0%, 100% { color: #ef4444; text-shadow: 0 0 8px rgba(239, 68, 68, 0.7); } /* Červená s záři */
    50% { color: #ffeb3b; text-shadow: none; } /* Žlutá bez záře */
}
.queueItem .countdown-time.urgent {
    animation: countdownBlink 1s infinite;
}

/* ANIMACE PŘÍCHOZÍHO POŽADAVKU DO FRONTĚ - NYNÍ ZJEMNĚNÁ VERZE */
@keyframes newRequestPulse {
    0% {
        background: linear-gradient(145deg, #FFD700, #FFECB3); /* Světlejší žlutá/oranžová */
        box-shadow: 0 0 10px rgba(255, 215, 0, 0.6), 0 0 5px rgba(255, 236, 179, 0.4);
        transform: scale(1.02); /* Jen lehce větší */
        border-color: #FFD700;
        color: #333; /* Tmavší text, ale ne černá */
    }
    50% {
        background: linear-gradient(145deg, #FFECB3, #FFD700); /* Zase o něco světlejší */
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.8), 0 0 8px rgba(255, 236, 179, 0.6);
        transform: scale(1.03); /* Mírně větší pulz, ale stále jemný */
        border-color: #FFD700;
        color: #000;
    }
    100% {
        background: #020617aa; /* Zpět na původní tmavé pozadí */
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        transform: scale(1); /* Zpět na původní velikost */
        border-color: transparent;
        color: white; /* Zpět na bílý text */
    }
}
.queueItem.new-request-pulse {
    animation: newRequestPulse 3s forwards ease-in-out; /* Animace 3s dopředu */
}

.assign button{ /* Tlačítka pro přiřazení - tam myš je */
margin:2px;
padding:6px 10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
transition: background 0.2s ease, transform 0.1s ease;
}
.assign button:hover {
    background: #1a9a4e;
    transform: translateY(-1px);
}
.assign .deleteBtn{ /* Název z tvého nového kódu */
background:#ef4444;
}
.assign .deleteBtn:hover {
    background: #dc2626;
}

/* Inputy a Add button v setup screen */
input{ /* Vylepšený styl pro inputy */
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #1e293b;
background: #0f172a;
color: white;
box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
}
.addBtn{ /* Vylepšený styl pro addBtn */
width:100%;
padding:12px;
background: linear-gradient(90deg, #3b82f6, #60a5fa); /* Gradient pro Add button */
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-size: 1.1em;
font-weight: bold;
box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);
transition: all 0.3s ease;
}
.addBtn:hover { /* Hover pro Add button */
    background: linear-gradient(90deg, #60a5fa, #3b82f6);
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(59, 130, 246, 0.6);
}

/* FORMULÁŘ PRO VZKAZY V NASTAVENÍ */
.message-form-section {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid rgba(34, 197, 94, 0.3);
}
.message-form-section h4 {
    color: #a3e635;
    margin-bottom: 15px;
}
.message-input {
    width: calc(100% - 20px); /* Odečteme padding */
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #1e293b;
    background: #0f172a;
    color: white;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
}
.sendMessageBtn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #f6b73b, #fabf60); /* Oranžový gradient pro vzkazy */
    border: none;
    border-radius: 8px;
    color: white;
    cursor:pointer;
    font-size: 1.1em;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(246, 183, 59, 0.4);
    transition: all 0.3s ease;
}
.sendMessageBtn:hover {
    background: linear-gradient(90deg, #fabf60, #f6b73b);
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(246, 183, 59, 0.6);
}
/* SEZNAM AKTIVNÍCH VZKAZŮ V NASTAVENÍ */
.active-messages-list {
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid rgba(34, 197, 94, 0.3);
}
.active-messages-list h4 {
    color: #a3e635;
    margin-bottom: 10px;
}
.active-message-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #020617aa;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 8px;
    font-size: 0.9em;
}
.active-message-item span {
    flex-grow: 1;
    margin-right: 10px;
    color: #e0ffe0;
}
.deleteMessageBtn {
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    transition: background 0.2s ease;
}
.deleteMessageBtn:hover {
    background: #dc2626;
}

/* Optimalizace pro mobilní "Požadavky" (requestsScreen) */
#requestsScreen{ /* Název z tvého nového kódu */
    display:flex;
    align-items:center;
    justify-content:center;
    min-height: calc(100vh - 50px);
}
#requestsScreen > div { /* Kontejner pro formulář */
    max-width: 90%; /* Pro mobily širší */
    width: 400px; /* Max šířka pro desktopy */
    margin: 20px auto; /* Centrování a mezera */
    padding: 25px; /* Větší padding */
    background: linear-gradient(145deg, #020617ee, #111827ee);
    border-radius: 22px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.7);
    border: 2px solid rgba(34, 197, 94, 0.5);
    position: relative;
}
#requestsScreen h3 { /* Název z tvého nového kódu */
    color: #22c55e;
    text-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
    margin-bottom: 30px; /* Větší mezera */
    font-size: 2.2em; /* Ještě větší nadpis */
}

/* --- MEDIA QUERY PRO MOBILNÍ TELEFONY (do 600px šířky) --- */
@media screen and (max-width: 600px) {
    #requestsScreen > div {
        width: 95%; /* Zvětšíme šířku na 95% dostupného místa */
        padding: 30px; /* Trochu větší padding */
        margin: 10px auto; /* Mírně menší okraje */
    }
    #requestsScreen h3 {
        font-size: 2.5em; /* Ještě větší nadpis pro lepší čitelnost */
        margin-bottom: 25px;
    }
    input { /* Všechny inputy */
        padding: 15px; /* Větší padding inputů */
        font-size: 1.1em; /* Větší text v inputech */
    }
    .addBtn { /* Tlačítko Odeslat */
        padding: 15px; /* Větší padding tlačítka */
        font-size: 1.2em; /* Větší text tlačítka */
    }
}

.popup{ /* Název z tvého nového kódu */
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:flex;
align-items:center;
justify-content:center;
font-size:90px;
font-weight:bold;
color:#22c55e;
z-index:100;
text-align:center;
padding:40px;
display:none;
}
.fullscreenPopup{ /* Název z tvého nového kódu */
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:flex;
align-items:center;
justify-content:center;
font-size:80px;
font-weight:bold;
color:#22c55e;
z-index:200;
text-align:center;
padding:40px;
display:none;
}
.production{display:none} /* Název z tvého nového kódu */

/* Styl pro animovaný "létající" prvek */
.flying-request {
    position: fixed;
    z-index: 9999;
    /* NOVÝ VÝCHOZÍ ZELENÝ GRADIENT */
    background: linear-gradient(145deg, #166534, #1a9a4e);
    box-shadow: 0 2px 10px rgba(34, 197, 94, 0.8); /* Jemný stín */
    color: white; /* Výchozí text bílý */
    padding: 10px 15px;
    border-radius: 10px;
    font-size: 1.2em;
    font-weight: bold;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    opacity: 0;
    will-change: transform, opacity, width, height, background, box-shadow, color; /* Vše, co se bude animovat */
    /* Transition se nastavuje v JS dynamicky pro jednotlivé fáze */
}

/* Keyframes pro pulzování středového létajícího požadavku */
@keyframes flyingRequestPulse {
    0%, 100% {
        box-shadow: 0 0 20px rgba(34, 197, 94, 0.7), 0 0 10px rgba(255, 255, 255, 0.3);
        transform: scale(1.1); /* Mírné zvětšení */
    }
    50% {
        box-shadow: 0 0 40px rgba(34, 197, 94, 0.9), 0 0 15px rgba(255, 255, 255, 0.5);
        transform: scale(1.12); /* Ještě mírnější zvětšení */
    }
}

/* Třída pro aplikaci pulzování */
.flying-request.pulsing-center {
    animation: flyingRequestPulse 1.5s infinite alternate ease-in-out;
}

/* Styly pro text uvnitř létajícího prvku (pro snadnější úpravy barev) */
.flying-content {
    text-align: center;
    font-size: 1.2em;
}
.flying-label {
    font-size: 1.5em; /* LIS číslo může být výraznější */
    font-weight: 900; /* Extra bold */
    background: linear-gradient(45deg, #6ee7b7, #34d399); /* Jasnější zelený gradient */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
        1px 1px 2px rgba(0,0,0,0.8), /* Ostřejší a výraznější stín */
        2px 2px 3px rgba(0,0,0,0.6);
    letter-spacing: 1px; /* Jemné rozestupy pro lepší čitelnost */
}
.flying-kontakt {
    font-weight: bold;
    color: #000; /* Černá na zeleném pozadí */
    margin-top: 10px;
}
.flying-prurez {
    color: #333; /* Tmavší šedá */
    font-size: 0.9em;
}
.flying-jmeno {
    color: #555; /* Šedá */
    font-size: 0.8em;
}

/* Specific styling for fullscreen animation */
.flying-request-fullscreen {
    font-size: 68.75px;  /* Z 62.5px na 68.75px (62.5 * 1.1) */
    width: 77.34375vw;    /* Z 70.3125vw na 77.34375vw (70.3125 * 1.1) */
    height: 77.34375vh;   /* Z 70.3125vh na 77.34375vh (70.3125 * 1.1) */
    left: 11.328125vw;     /* Nové centrování: (100 - 77.34375) / 2 = 11.328125 */
    top: 11.328125vh;    /* Nové centrování: (100 - 77.34375) / 2 = 11.328125 */
    padding: 43px; /* Z 39px na 42.9px (zaokrouhleno na 43px) */
    border-radius: 20px;
    opacity: 0;
    transform: scale(0.1);
}
/* Ostatní vnitřní styly (flying-content, flying-label atd.) zůstávají stejné, protože jsou relativní k rodiči */
.flying-request-fullscreen .flying-content {
    font-size: 1em; 
}
.flying-request-fullscreen .flying-label {
    font-size: 1.5em; 
}
.flying-request-fullscreen .flying-kontakt {
    font-size: 1.3em; 
}
.flying-request-fullscreen .flying-prurez {
    font-size: 1em; 
}
.flying-request-fullscreen .flying-jmeno {
    color: #000;    
    margin-top: 5px;
}

/* BLINK ANIMACE Z BETA 4.5 */
.blink{animation:blinkAnim 1s infinite;}

@keyframes blinkAnim{
0%{background:#22c55e}
50%{background:#111827}
100%{background:#22c55e}
}

/* Styly pro počítadlo hotových požadavků */
.completed-count-indicator {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 60px; /* Velikost indikátoru */
    height: 60px;
    border-radius: 50%;
    display: none !important;
    align-items: center;
    justify-content: center;
    font-size: 1.2em; /* Větší text pro počet */
    font-weight: bold;
    background-color: #22c55e; /* Zelené pozadí */
    color: black; /* Černý text */
    box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    /* Přechody pro plynulejší zobrazení/skrytí/aktualizaci */
    transition: background-color 0.3s ease, box-shadow 0.3s ease;
}

</style>
</head>


<body>

<div class="topbarContainer">
<div class="kemmsTop">KEMMSOFT BETA 4.5</div>

<div class="message-board-container" id="messageBoardContainer">
    <div class="message-board" id="messageBoard">
        </div>
</div>

<div class="realtime-clock" id="realtimeClock"></div> <div class="topbar" id="topbar">
<button onclick="setupMode()">Nastavení</button>
<button onclick="productionMode()">Výrobní obrazovka</button>
<button onclick="requestsMode()">Zadání požadavku</button>
</div>
</div>

<div class="header" id="mainHeader">---</div>

<div id="setupScreen">
<div class="layout">

<div>
<div class="rowTop" id="rowTop"></div>
<div class="rowBottom" id="rowBottom"></div>
</div>

<div class="queue">
<div class="queueTitle">
    <span>Nadcházející požadavky</span>
    <span class="count" id="queueCountSetup">0</span>
</div>
<div id="queueList"></div>

<h4>Přidat nový požadavek</h4>

<input id="setupKontakt" placeholder="Číslo kontaktu">
<input id="setupPrurez" placeholder="Průřez">
<input id="setupJmeno" placeholder="Jméno">

<button class="addBtn" onclick="addRequestSetup()">Odeslat</button>

<div class="message-form-section">
    <h4>Odeslat nový vzkaz</h4>
    <input id="messageInput" class="message-input" placeholder="Zadejte vzkaz">
    <button class="sendMessageBtn" onclick="addMessage()">Odeslat vzkaz</button>
</div>

<div class="active-messages-list">
    <h4>Aktivní vzkazy (konec po 24h)</h4>
    <div id="activeMessagesContainer">
        </div>
</div>

</div>
</div>
</div>

<div id="productionScreen" class="production">
<div class="layout">

<div>
<div class="rowTop" id="prodTop"></div>
<div class="rowBottom" id="prodBottom"></div>
</div>

<div class="queue">
<div class="queueTitle">
    <span>Nadcházející požadavky</span>
    <span class="count" id="queueCountProd">0</span>
</div>
<div id="prodQueue"></div>
</div>

</div>
</div>

<div id="requestsScreen" class="production">

<div style="max-width:420px;margin:0 auto;">

<h3>Zadání požadavku</h3>

<input id="kontakt" placeholder="Číslo kontaktu">
<input id="prurez" placeholder="Průřez">
<input id="jmeno" placeholder="Jméno">

<button class="addBtn" onclick="addRequest()">Odeslat</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig={
    apiKey:"AIzaSyAhiCfh-Di_NdPO5rGM7CZFQGaSymcdWxI",
    authDomain:"lisyweb-df6d9.firebaseapp.com",
    databaseURL:"https://lisyweb-df6d9-default-rtdb.firebaseio.com/",
    projectId:"lisyweb-df6d9"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const LIS_COUNT=7;
let lisy=[];
let pozadavky=[];
let lastPozadavky = []; // Nové pole pro sledování předchozích požadavků
let lastLisy=[]; // Udržuje předchozí stav LISů pro detekci změn a animace
let messages = []; // Pole pro vzkazy
let lastMessagesCount = 0; // Pro detekci nových vzkazů

// HLASOVÝ MODUL - SLEDOVÁNÍ PŘEČTENÝCH VZKAZŮ
let readMessagesCount = {}; // Sleduje kolikrát byl vzkaz přečten {messageId: count}

let audioContext = null; // Pro zvukovou notifikaci
let lastResetDate = localStorage.getItem('lastResetDate') || new Date().toDateString(); // Datum posledního resetu
let requestCountdownIntervals = {}; // Objekt pro uchování intervalů pro každý požadavek ve frontě

// Pro rolování vzkazů
let currentMessageIndex = 0; // Sleduje aktuální vzkaz, který se zobrazuje
let messageRotationTimeout; // Timeout pro střídání zpráv

// FUNKCE PRO HLASOVÝ VÝSTUP
function speak(text) {
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'cs-CZ';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }
}

// Funkce pro přehrání tónu
function playTone(frequency = 900, duration = 0.25) {
    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    const o = audioContext.createOscillator();
    const g = audioContext.createGain();
    o.frequency.value = frequency; 
    o.connect(g);
    g.connect(audioContext.destination);
    o.start();
    o.stop(audioContext.currentTime + duration);
}

function emptyLis(){ return {kontakt:"",prurez:"",jmeno:"",time:"", completedToday: 0} }
function timeNow(){ return new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}) }

// Funkce pro aktualizaci mainHeader a spuštění blinku hlavičky
function updateMainHeaderDisplay(text){
    const header=document.getElementById("mainHeader");
    if(!header) return;

    if (header.innerText !== text) {
        header.innerText = text;
        if (text !== "---") {
            header.classList.add("blink"); 
            setTimeout(() => header.classList.remove("blink"), 8000);
        } else {
            header.classList.remove("blink"); 
        }
    }
}

onValue(ref(db,'lisy'),async snap=>{
  const data = snap.val();
  const currentLisy = Array.from({length:LIS_COUNT}, (v, i) => {
      const lisData = data && data[i] ? data[i] : emptyLis();
      if (lisData.completedToday === undefined) {
          lisData.completedToday = 0;
      }
      return lisData;
  });
  
  const today = new Date().toDateString();
  if (today !== lastResetDate) {
      lastResetDate = today;
      localStorage.setItem('lastResetDate', today);
      for (let i = 0; i < LIS_COUNT; i++) {
          await update(ref(db, `lisy/${i}`), { completedToday: 0 });
      }
  }

  for (let i = 0; i < LIS_COUNT; i++) {
    const lis = currentLisy[i] || emptyLis();
    const oldLis = lastLisy[i] || emptyLis();

    const hasContact = !!lis.kontakt;
    const oldHasContact = !!(oldLis && oldLis.kontakt);
    const dataChanged = (hasContact && (!oldHasContact || oldLis.kontakt !== lis.kontakt || oldLis.prurez !== lis.prurez || oldLis.jmeno !== lis.jmeno));
    
    if (hasContact && dataChanged) {
        // HLASOVÉ HLÁŠENÍ PRO LIS
        speak(`Nyní je nastavený LIS ${i + 1}. Kontakt ${lis.kontakt}, Síla ${lis.prurez}, Jméno ${lis.jmeno}`);
        
        playTone(900, 0.25);
        const card=document.getElementById("lis"+i);
        const prod=document.getElementById("prodLis"+i);
        
        if(card) {
            card.classList.add("active");
            setTimeout(()=>{
                card.classList.remove("active");
                card.classList.add("assigned");
            },1000);
        }
        if(prod) {
            prod.classList.add("active");
            setTimeout(()=>{
                prod.classList.remove("active");
                prod.classList.add("assigned");
            },1000);
        }
    }
  }

  lisy=currentLisy;
  lastLisy=[...currentLisy];
  render();
});

onValue(ref(db,'pozadavky'),snap=>{
    const data=snap.val();
    const newPozadavky = data ? Object.entries(data).map(([id,val])=>({id,...val})) : [];
    
    if (newPozadavky.length > lastPozadavky.length) {
        playTone(1200, 0.4); 
        // HLASOVÉ HLÁŠENÍ PRO NOVÝ POŽADAVEK
        speak("Příchozí nový požadavek do fronty");
    }

    pozadavky = newPozadavky;
    lastPozadavky = [...newPozadavky];
    render();
});

// SLEDOVÁNÍ VZKAZŮ PRO HLASOVÝ MODUL
onValue(ref(db, 'messages'), snap => {
    const data = snap.val();
    const newMessages = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
    
    newMessages.forEach(msg => {
        // Pokud je vzkaz nový nebo se změnil a ještě nebyl přečten 2x
        if (!readMessagesCount[msg.id]) {
            readMessagesCount[msg.id] = 0;
        }
        
        if (readMessagesCount[msg.id] < 2) {
            speak(`Nový vzkaz: ${msg.text}`);
            readMessagesCount[msg.id]++;
            
            // Druhé přečtení s malým zpožděním, pokud je to poprvé
            if (readMessagesCount[msg.id] === 1) {
                setTimeout(() => {
                    speak(`Opakuji vzkaz: ${msg.text}`);
                    readMessagesCount[msg.id]++;
                }, 5000);
            }
        }
    });

    messages = newMessages;
    renderMessages();
});

window.addRequest=()=>{
    const k=document.getElementById("kontakt");
    const p=document.getElementById("prurez");
    const j=document.getElementById("jmeno");
    if(k.value && p.value){
        push(ref(db,'pozadavky'),{kontakt:k.value,prurez:p.value,jmeno:j.value,time:timeNow(), timestamp: Date.now()});
        k.value=""; p.value=""; j.value="";
    }
};

window.addRequestSetup=()=>{
    const k=document.getElementById("setupKontakt");
    const p=document.getElementById("setupPrurez");
    const j=document.getElementById("setupJmeno");
    if(k.value && p.value){
        push(ref(db,'pozadavky'),{kontakt:k.value,prurez:p.value,jmeno:j.value,time:timeNow(), timestamp: Date.now()});
        k.value=""; p.value=""; j.value="";
    }
};

window.addMessage = () => {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (text) {
        push(ref(db, 'messages'), {
            text: text,
            timestamp: Date.now()
        });
        input.value = "";
    }
};

window.deleteMessage = (id) => {
    remove(ref(db, `messages/${id}`));
};

window.assign=(lisIndex, reqId)=>{
    const req=pozadavky.find(r=>r.id===reqId);
    if(req){
        set(ref(db,`lisy/${lisIndex}`),{
            kontakt:req.kontakt,
            prurez:req.prurez,
            jmeno:req.jmeno,
            time:timeNow(),
            completedToday: (lisy[lisIndex]?.completedToday || 0)
        });
        remove(ref(db,`pozadavky/${reqId}`));
    }
};

window.done=async (i)=>{
    const currentCompleted = lisy[i]?.completedToday || 0;
    await update(ref(db, `lisy/${i}`), {
        kontakt: "",
        prurez: "",
        jmeno: "",
        time: "",
        completedToday: currentCompleted + 1
    });
};

window.removeReq=(id)=>remove(ref(db,`pozadavky/${id}`));

function render(){
    const rowTop=document.getElementById("rowTop");
    const rowBottom=document.getElementById("rowBottom");
    const prodTop=document.getElementById("prodTop");
    const prodBottom=document.getElementById("prodBottom");
    
    rowTop.innerHTML=""; rowBottom.innerHTML="";
    prodTop.innerHTML=""; prodBottom.innerHTML="";

    lisy.forEach((l,i)=>{
        const isAssigned = !!l.kontakt;
        const cardHtml=`
            <div class="card ${isAssigned?'assigned':''}" id="lis${i}">
                <div class="lis">LIS ${i+1}</div>
                <div class="kontakt">${l.kontakt || '-'}</div>
                <div class="prurez">${l.prurez || '-'}</div>
                <div class="jmeno">${l.jmeno || '-'}</div>
                <div class="time">${l.time || '-'}</div>
                ${isAssigned?`<button class="hotovo" onclick="done(${i})">HOTOVO</button>`:''}
            </div>
        `;
        if(i<3) rowTop.innerHTML+=cardHtml; else rowBottom.innerHTML+=cardHtml;

        const prodCardHtml=`
            <div class="card ${isAssigned?'assigned':''}" id="prodLis${i}">
                <div class="lis">LIS ${i+1}</div>
                <div class="kontakt">${l.kontakt || '-'}</div>
                <div class="prurez">${l.prurez || '-'}</div>
                <div class="jmeno">${l.jmeno || '-'}</div>
                <div class="time">${l.time || '-'}</div>
            </div>
        `;
        if(i<3) prodTop.innerHTML+=prodCardHtml; else prodBottom.innerHTML+=prodCardHtml;
    });

    const qList=document.getElementById("queueList");
    const pQueue=document.getElementById("prodQueue");
    qList.innerHTML=""; pQueue.innerHTML="";

    pozadavky.sort((a,b)=>a.timestamp-b.timestamp).forEach(r=>{
        const itemHtml=`
            <div class="queueItem">
                <b>${r.kontakt}</b> (${r.prurez}) - ${r.jmeno}<br>
                <span class="time">${r.time}</span>
                <div class="assign">
                    ${Array.from({length:LIS_COUNT},(_,i)=>`<button onclick="assign(${i},'${r.id}')">${i+1}</button>`).join('')}
                    <button class="deleteBtn" onclick="removeReq('${r.id}')">X</button>
                </div>
            </div>
        `;
        qList.innerHTML+=itemHtml;

        pQueue.innerHTML+=`
            <div class="queueItem">
                <b>${r.kontakt}</b> (${r.prurez}) - ${r.jmeno}<br>
                <span class="time">${r.time}</span>
            </div>
        `;
    });

    document.getElementById("queueCountSetup").innerText = pozadavky.length;
    document.getElementById("queueCountProd").innerText = pozadavky.length;
}

function renderMessages() {
    const container = document.getElementById("activeMessagesContainer");
    const board = document.getElementById("messageBoard");
    container.innerHTML = "";
    
    if (messages.length === 0) {
        board.innerHTML = "";
        return;
    }

    messages.forEach(msg => {
        container.innerHTML += `
            <div class="active-message-item">
                <span>${msg.text}</span>
                <button class="deleteMessageBtn" onclick="deleteMessage('${msg.id}')">Smazat</button>
            </div>
        `;
    });

    rotateMessages();
}

function rotateMessages() {
    clearTimeout(messageRotationTimeout);
    const board = document.getElementById("messageBoard");
    
    if (messages.length === 0) return;
    if (currentMessageIndex >= messages.length) currentMessageIndex = 0;

    const msg = messages[currentMessageIndex];
    board.innerHTML = `
        <div class="message-item-wrapper" style="--marquee-duration: 15s; --scroll-target: -200%;">
            <div class="message-item">${msg.text}</div>
        </div>
    `;

    currentMessageIndex++;
    messageRotationTimeout = setTimeout(rotateMessages, 15000);
}

window.setupMode=()=>{
    document.getElementById("setupScreen").style.display="block";
    document.getElementById("productionScreen").style.display="none";
    document.getElementById("requestsScreen").style.display="none";
};
window.productionMode=()=>{
    document.getElementById("setupScreen").style.display="none";
    document.getElementById("productionScreen").style.display="block";
    document.getElementById("requestsScreen").style.display="none";
};
window.requestsMode=()=>{
    document.getElementById("setupScreen").style.display="none";
    document.getElementById("productionScreen").style.display="none";
    document.getElementById("requestsScreen").style.display="block";
};

setInterval(()=>{
    document.getElementById("realtimeClock").innerText = new Date().toLocaleTimeString('cs-CZ');
},1000);

</script>
</body>
</html>
